  <div class="ecran" id="accueil">
    <div class="saison">SAISON 2 · ÉPISODE 4</div>
    <h1>Les Aventures d'Étincelle</h1>
    <h2>« L'arme de lumière »</h2>
    <div class="duree">🌙 5 minutes · 5 chapitres · La ville en danger</div>
    <button class="btn" id="play">▶ Commencer</button>
  </div>

  <div class="ecran" id="fin">
    <h1>FIN DE L'ÉPISODE 4</h1>
    <p>La ville est tombée dans le noir... mais l'équipe connaît le secret : l'Étoile du Premier Matin. 🌟<br>Y arriveront-ils à temps ?... À SUIVRE !</p>
    <button class="btn vert" id="rejouer">↻ Revoir l'épisode</button>
  </div>
</div>
<script>
const FILM = [
 {id:'d1', dur:60, subs:[
   [1,"Le grimoire ne disait pas comment vaincre le Dévoreur."],
   [11,"« Il n'y a qu'une personne qui puisse savoir », dit Hulotte."],
   [22,"« La Lune. Elle l'a déjà banni, autrefois. »"],
   [33,"L'équipe s'éleva haut, très haut, au-dessus des nuages."],
   [44,"Là, immense et douce, la Lune les attendait en souriant."],
   [53,"« Je vous espérais, gardiens de la lumière », dit-elle."]]},
 {id:'d2', dur:60, subs:[
   [1,"« Le Dévoreur ne peut être détruit par la force », dit la Lune."],
   [12,"« Une seule chose peut l'arrêter : l'Étoile du Premier Matin. »"],
   [23,"« La toute première lumière, cachée depuis la nuit des temps. »"],
   [34,"« Elle dort au sommet du Mont de l'Aube, gardée par le givre. »"],
   [45,"« Mais prenez garde : le chemin est long, et lui est proche. »"],
   [53,"« Allez, mes enfants. Le ciel compte sur vous. »"]]},
 {id:'d3', dur:60, subs:[
   [1,"En redescendant, l'équipe vit une chose terrible."],
   [12,"Une vague verte engloutissait l'horizon vers la ville."],
   [23,"« Il n'a pas attendu ! Il attaque maintenant ! » cria Étincelle."],
   [34,"Les sbires déferlaient sur les toits par centaines."],
   [45,"« On ne peut pas les laisser ! Il faut défendre la ville ! »"],
   [53,"L'équipe plongea vers le combat, le cœur battant."]]},
 {id:'d4', dur:60, subs:[
   [1,"La bataille fut la plus rude de toutes."],
   [11,"Étincelle brillait tant qu'elle pouvait, mais s'épuisait."],
   [22,"Le chat, Lueur, Hulotte : chacun se battait sans relâche."],
   [33,"Puis le Dévoreur lui-même s'avança, gigantesque."],
   [44,"D'un souffle, il éteignit la moitié des lumières d'un coup."],
   [53,"« Vous ne pouvez rien contre moi », gronda-t-il en riant."]]},
 {id:'d5', dur:60, subs:[
   [1,"L'équipe recula, à bout de forces, dans les décombres."],
   [12,"La ville était plongée dans le noir. Le Dévoreur triomphait."],
   [23,"« Retenez bien cette nuit », dit-il. « C'est la première. »"],
   [34,"« Bientôt, plus aucune étoile ne brillera. Aucune. »"],
   [44,"Étincelle serra les poings : « On trouvera l'Étoile du Matin. »"],
   [52,"« On reviendra. Et cette fois, tu perdras. »"],
   [57,"L'équipe s'envola dans la nuit noire... À SUIVRE !"]]}
];
const scenes = FILM.map(s=>document.getElementById(s.id));
const stEl=document.getElementById('soustitre'), chEl=document.getElementById('chapitre'), barre=document.getElementById('barre');
const total=FILM.reduce((a,s)=>a+s.dur,0);
let idx=0,t=0,timer=null,pause=false;
function tic(){
  const sc=FILM[idx];
  scenes.forEach((el,i)=>el.classList.toggle('on',i===idx));
  chEl.textContent='CHAPITRE '+(idx+1)+' / '+FILM.length;
  let cur=''; for(const [ts,txt] of sc.subs){ if(t>=ts) cur=txt; }
  if(stEl.textContent!==cur){ stEl.textContent=cur; stEl.classList.remove('on'); void stEl.offsetWidth; stEl.classList.add('on'); }
  let ec=0; for(let i=0;i<idx;i++) ec+=FILM[i].dur; ec+=t;
  barre.style.width=(ec/total*100)+'%';
  t++;
  if(t>=sc.dur){ t=0; idx++; if(idx>=FILM.length){ fin(); return; } }
}
function demarrer(){ document.getElementById('accueil').style.display='none'; document.getElementById('fin').style.display='none'; idx=0;t=0;pause=false; clearInterval(timer); timer=setInterval(()=>{if(!pause)tic();},1000); tic(); }
function fin(){ clearInterval(timer); document.getElementById('fin').style.display='flex'; }
document.getElementById('play').onclick=demarrer;
document.getElementById('rejouer').onclick=demarrer;
document.getElementById('pausebtn').onclick=function(){ pause=!pause; this.textContent=pause?'▶':'⏸'; };
</script>
