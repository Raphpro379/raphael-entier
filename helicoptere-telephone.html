<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hélicoptère</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #aee0ff; }
  body { background: linear-gradient(to bottom, #bfe9ff 0%, #8fd0e8 55%, #a8e0a8 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 94vw; max-width: 520px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #b83a3a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<circle cx="315" cy="55" r="24" fill="#fff2a8"/>
<g><ellipse cx="70" cy="80" rx="30" ry="13" fill="#fff" opacity="0.8"/><ellipse cx="95" cy="72" rx="22" ry="11" fill="#fff" opacity="0.8"/><animateTransform attributeName="transform" type="translate" values="0 0;30 0;0 0" dur="16s" repeatCount="indefinite"/></g>
<g><ellipse cx="300" cy="150" rx="26" ry="11" fill="#fff" opacity="0.75"/><animateTransform attributeName="transform" type="translate" values="0 0;-28 0;0 0" dur="20s" repeatCount="indefinite"/></g>
<!-- collines -->
<ellipse cx="90" cy="360" rx="150" ry="70" fill="#7bc04a"/><ellipse cx="310" cy="365" rx="150" ry="70" fill="#8fd25a"/>
<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<g><animateTransform attributeName="transform" type="translate" values="0 0; 6 0; 0 0" dur="4s" repeatCount="indefinite" additive="sum"/>
<!-- queue -->
<path d="M210 175 L290 160 L294 172 L214 190 Z" fill="#e05a5a"/>
<circle cx="292" cy="166" r="12" fill="#c94a4a"/>
<g><animateTransform attributeName="transform" type="rotate" from="0 292 166" to="360 292 166" dur="0.2s" repeatCount="indefinite"/><rect x="290" y="150" width="4" height="32" fill="#5a3a3a"/></g>
<!-- corps -->
<ellipse cx="160" cy="180" rx="60" ry="42" fill="#e05a5a"/>
<ellipse cx="160" cy="180" rx="60" ry="42" fill="#e05a5a"/>
<!-- vitre -->
<path d="M120 175 Q118 150 150 148 Q180 150 182 172 Q150 180 120 175 Z" fill="#8fd0f0" stroke="#c94a4a" stroke-width="2"/>
<ellipse cx="135" cy="160" rx="6" ry="8" fill="#fff" opacity="0.6"/>
<!-- bande -->
<rect x="100" y="188" width="120" height="8" fill="#ffd24a"/>
<!-- patins -->
<line x1="130" y1="222" x2="130" y2="238" stroke="#5a3a3a" stroke-width="3"/><line x1="190" y1="222" x2="190" y2="238" stroke="#5a3a3a" stroke-width="3"/>
<rect x="108" y="238" width="104" height="6" rx="3" fill="#4a4a4a"/>
<!-- mat + rotor -->
<rect x="156" y="128" width="8" height="18" fill="#5a3a3a"/>
<g><animateTransform attributeName="transform" type="rotate" from="0 160 128" to="360 160 128" dur="0.15s" repeatCount="indefinite"/><ellipse cx="160" cy="128" rx="90" ry="6" fill="#5a3a3a" opacity="0.85"/></g>
<ellipse cx="160" cy="128" rx="90" ry="6" fill="#3a3a3a" opacity="0.2"/>
</g>
</g>
</svg>
<div id="hint">Mon hélicoptère 🚁</div>
</body>
</html>
