const CQ=[{q:'Que fait la boucle "for" ?',opts:['Répéter du code','Conditionner','Stocker','Afficher'],a:0},{q:'Qu\'est-ce qu\'une variable ?',opts:['Un bug','Une boîte de valeur','Une commande','Un site web'],a:1},{q:'Que signifie HTML ?',opts:['Hyper Text Markup Language','High Tech Machine Learning','How To Make Links','Human Text Meta Language'],a:0},{q:'Que fait "if" en code ?',opts:['Répéter','Stocker','Tester une condition','Afficher'],a:2},{q:'Que signifie CSS ?',opts:['Create Simple Sites','Cascading Style Sheets','Computer Science Styling','Color System Software'],a:1},{q:'Qu\'est-ce qu\'un algorithme ?',opts:['Un langage','Une suite d\'instructions','Un bug','Un ordinateur'],a:1},{q:'Que fait "console.log" ?',opts:['Crée une page','Affiche dans la console','Supprime du code','Lance une boucle'],a:1},{q:'Quel symbole commence un commentaire JS ?',opts:['##','//','**','&&'],a:1}];
function renderCoding(){if(G.codeIdx>=CQ.length)return `<div class="card" style="text-align:center;padding:24px"><div style="font-size:52px">💻</div><div class="fredoka" style="font-size:22px;color:var(--cyan);margin:10px 0">Coding Quiz terminé !</div><div>Score: ${G.codeScore}/${CQ.length}</div><div style="margin-top:14px"><button class="btn btn-cyan" style="color:#000" onclick="G.codeIdx=0;G.codeScore=0;G.codeAnswered=false;go('coding')">🔄</button></div></div>`;const q=CQ[G.codeIdx];return `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px"><span class="badge badge-cyan">Coding</span><span style="font-size:13px;color:var(--text2)">${G.codeIdx+1}/${CQ.length}</span><span class="fredoka" style="font-size:17px;color:var(--yellow)">${G.codeScore} pts</span></div><div class="prog" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct(G.codeIdx,CQ.length)}%;background:linear-gradient(90deg,var(--cyan),var(--purple))"></div></div><div style="background:var(--bg3);padding:12px;border-radius:var(--rad);border-left:3px solid var(--cyan);margin-bottom:14px;font-size:15px;font-weight:800">${q.q}</div>${q.opts.map((o,i)=>`<button class="qopt" id="cqo-${i}" onclick="answerCoding(${i})">${o}</button>`).join('')}<div id="cq-fb" style="display:none;padding:10px;border-radius:var(--rad);text-align:center;font-weight:800;font-size:14px;margin-top:6px"></div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-cyan" style="color:#000" id="cq-next" onclick="G.codeIdx++;G.codeAnswered=false;go('coding')" disabled>Suivant →</button></div></div>`;}
function answerCoding(i){if(G.codeAnswered)return;G.codeAnswered=true;const q=CQ[G.codeIdx];document.querySelectorAll('.qopt').forEach((b,j)=>{b.disabled=true;if(j===q.a)b.classList.add('correct');else if(j===i&&i!==q.a)b.classList.add('wrong');});const fb=document.getElementById('cq-fb');fb.style.display='block';if(i===q.a){G.codeScore++;fb.style.background='rgba(90,240,224,.15)';fb.style.color='var(--cyan)';fb.textContent='✅ Correct ! +8 🪙';addCoins(8);addXP(6);}else{fb.style.background='rgba(240,90,90,.15)';fb.style.color='var(--redl)';fb.textContent='❌ Réponse: '+q.opts[q.a];}document.getElementById('cq-next').disabled=false;}

/* ===== DACTYLOGRAPHIE ===== */
const TW=['chat','chien','maison','école','voiture','soleil','lune','étoile','fusée','robot','dragon','magie','cristal','super','génie','joueur','clavier','rapide','vitesse','science','pixel','laser','ninja','cosmos','galaxie'];
function renderType(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--cyan)">Mots: <span id="ty-s">${G.typeScore}</span></span><span class="badge badge-yellow">Rec: ${getRecord('type')}</span><span style="font-size:14px;font-weight:800;color:var(--pink)">⏱ <span id="ty-t">60</span>s</span></div><div style="background:var(--bg3);padding:14px;border-radius:var(--rad);font-size:18px;font-weight:800;color:var(--purplel);text-align:center;min-height:48px" id="ty-w">Appuie sur Démarrer !</div><input id="ty-inp" placeholder="Tape le mot..." oninput="checkType()" style="margin-top:10px;font-size:15px;text-align:center" disabled><div style="text-align:center;margin-top:12px"><button class="btn btn-pink" onclick="startType()">▶ Démarrer</button></div>`;}
function startType(){if(window._typeIv)clearInterval(window._typeIv);G.typeScore=0;let t=60;const s=document.getElementById('ty-s');if(s)s.textContent=0;const ti=document.getElementById('ty-t');const inp=document.getElementById('ty-inp');if(inp){inp.disabled=false;inp.value='';inp.focus();}newTypeWord();window._typeIv=setInterval(()=>{t--;if(ti)ti.textContent=t;if(t<=0){clearInterval(window._typeIv);const wd=document.getElementById('ty-w');if(wd)wd.textContent='⏰ Terminé !';if(inp){inp.disabled=true;inp.value='';}if(setRecord('type',G.typeScore))toast('⌨️ Record: '+G.typeScore+' mots !','cyan');toast('Score: '+G.typeScore+' mots','purple');addXP(Math.floor(G.typeScore*1.5));addCoins(G.typeScore);if(G.typeScore>=30)unlockA('type_rec');}},1000);}
function newTypeWord(){const el=document.getElementById('ty-w');if(el)el.textContent=TW[rng(0,TW.length-1)];}
function checkType(){const inp=document.getElementById('ty-inp');const wd=document.getElementById('ty-w');if(!inp||!wd)return;if(inp.value.trim()===wd.textContent){G.typeScore++;const s=document.getElementById('ty-s');if(s)s.textContent=G.typeScore;inp.value='';newTypeWord();addXP(2);}}

/* ===== DEVIN NOMBRE ===== */
function renderNumber(){return `<div class="card"><div class="card-title">🎯 Devine le nombre (1-100)</div><div class="fredoka" style="font-size:18px;text-align:center;color:var(--purplel);margin:12px 0" id="nb-h">Pense à un nombre...</div><input id="nb-inp" type="number" min="1" max="100" placeholder="Ton nombre (1-100)" style="margin-bottom:10px;font-size:16px;text-align:center" onkeydown="if(event.key==='Enter')guessNum()"><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn btn-purple" onclick="guessNum()">✓ Deviner</button><button class="btn" onclick="initNumber()">🔄 Nouveau</button></div><div id="nb-hist" style="margin-top:12px;max-height:110px;overflow-y:auto"></div><div style="text-align:center;margin-top:8px;font-size:13px;color:var(--text2)">Essais: <span id="nb-tr" style="color:var(--purplel)">${G.numberGuesses}</span> | Score: <span id="nb-sc" style="color:var(--yellow)">${G.numberScore}</span></div></div>`;}
function initNumber(){G.numberTarget=rng(1,100);G.numberGuesses=0;const h=document.getElementById('nb-h');if(h)h.textContent='J\'ai choisi un nombre entre 1 et 100 !';const hi=document.getElementById('nb-hist');if(hi)hi.innerHTML='';const tr=document.getElementById('nb-tr');if(tr)tr.textContent=0;}
function guessNum(){const inp=document.getElementById('nb-inp');if(!inp)return;const v=parseInt(inp.value);if(!v||v<1||v>100)return;G.numberGuesses++;inp.value='';const hi=document.getElementById('nb-hist');const h=document.getElementById('nb-h');const tr=document.getElementById('nb-tr');if(tr)tr.textContent=G.numberGuesses;let msg='',color='var(--text2)';if(v===G.numberTarget){msg='🎉 Correct en '+G.numberGuesses+' essais !';color='var(--green)';G.numberScore+=Math.max(1,11-G.numberGuesses);const sc=document.getElementById('nb-sc');if(sc)sc.textContent=G.numberScore;addXP(10);addCoins(5);setRecord('number',G.numberScore);setTimeout(initNumber,2000);}else if(v<G.numberTarget){msg='⬆ '+v+' — Plus grand !';color='var(--cyan)';}else{msg='⬇ '+v+' — Plus petit !';color='var(--orange)';}if(h){h.textContent=msg;h.style.color=color;}if(hi){const d=document.createElement('div');d.style.cssText='font-size:12px;color:'+color+';padding:3px 0';d.textContent=msg;hi.prepend(d);}}

/* ===== BALANCE ===== */
function renderBalance(){return `<div class="card"><div class="card-title">⚖️ Équilibre des nombres</div><div style="text-align:center;font-size:14px;color:var(--text2);margin-bottom:14px">Trouve deux nombres qui font la somme cible !</div><div class="fredoka" style="font-size:40px;text-align:center;color:var(--yellow);margin-bottom:14px">Cible: <span id="bl-t">${G.balanceTarget}</span></div><div class="grid-2" style="gap:10px;margin-bottom:12px"><input id="bl-l" type="number" placeholder="Nombre 1" min="1" max="99"><input id="bl-r" type="number" placeholder="Nombre 2" min="1" max="99"></div><div style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:10px">Somme: <span id="bl-sum" style="color:var(--purplel);font-weight:800">?</span></div><div id="bl-bar" style="height:8px;border-radius:4px;background:var(--bg4);overflow:hidden;margin-bottom:12px"><div id="bl-prog" style="height:100%;border-radius:4px;background:var(--green);width:0%;transition:width .3s"></div></div><button class="btn btn-yellow" style="width:100%;color:#000" onclick="checkBalance()">✓ Vérifier</button><div id="bl-msg" style="text-align:center;margin-top:10px;font-weight:800;font-size:14px;min-height:22px"></div><div style="text-align:center;margin-top:8px"><button class="btn btn-sm" onclick="newBalance()">🔄 Nouveau</button></div></div>`;  }
function newBalance(){G.balanceTarget=rng(10,50);const t=document.getElementById('bl-t');if(t)t.textContent=G.balanceTarget;const msg=document.getElementById('bl-msg');if(msg)msg.textContent='';const li=document.getElementById('bl-l');const ri=document.getElementById('bl-r');if(li)li.value='';if(ri)ri.value='';updateBalanceSum();}
function updateBalanceSum(){const l=parseInt(document.getElementById('bl-l')?.value)||0;const r=parseInt(document.getElementById('bl-r')?.value)||0;const s=document.getElementById('bl-sum');const p=document.getElementById('bl-prog');if(s)s.textContent=l&&r?l+r:'?';if(p)p.style.width=Math.min(100,pct(l+r,G.balanceTarget))+'%';}
function checkBalance(){const l=parseInt(document.getElementById('bl-l')?.value);const r=parseInt(document.getElementById('bl-r')?.value);const msg=document.getElementById('bl-msg');if(!msg)return;if(l+r===G.balanceTarget){msg.textContent='🎉 Parfait ! +15 🪙';msg.style.color='var(--green)';addCoins(15);addXP(10);setTimeout(newBalance,1500);}else{msg.textContent=`❌ ${l}+${r}=${l+r} ≠ ${G.balanceTarget}`;msg.style.color='var(--redl)';}}
document.addEventListener('input',e=>{if(e.target.id==='bl-l'||e.target.id==='bl-r')updateBalanceSum();});

/* ===== REACTION ===== */
function renderReaction(){return `<div class="card" style="text-align:center;padding:20px"><div class="fredoka" style="font-size:20px;color:var(--purplel);margin-bottom:12px">Test de réaction ⚡</div><div style="font-size:14px;color:var(--text2);margin-bottom:16px">Meilleur: <span style="color:var(--yellow)">${G.reactionBest<9999?G.reactionBest+'ms':'—'}</span></div><div id="rx-zone" style="width:100%;height:150px;border-radius:var(--rad-lg);background:${G.reactionState==='go'?'var(--green)':'var(--bg3)'};border:2px solid ${G.reactionState==='go'?'var(--green)':'rgba(127,90,240,.3)'};display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none" onclick="rxClick()"><span class="fredoka" style="font-size:22px;color:${G.reactionState==='go'?'#000':'var(--text2)'}">${G.reactionState==='wait'?'Clique pour commencer':G.reactionState==='ready'?'Attends...':'MAINTENANT !'}</span></div><div id="rx-res" class="fredoka" style="font-size:26px;color:var(--yellow);margin-top:14px;min-height:34px"></div></div>`;}
function rxClick(){if(G.reactionState==='wait'){G.reactionState='ready';go('reaction');const d=rng(1500,4000);window._rxIv=setTimeout(()=>{G.reactionState='go';G.reactionStart=Date.now();go('reaction');},d);}else if(G.reactionState==='ready'){clearTimeout(window._rxIv);G.reactionState='wait';go('reaction');const el=document.getElementById('rx-res');if(el){el.textContent='Trop tôt !';el.style.color='var(--red)';}}else if(G.reactionState==='go'){const ms=Date.now()-G.reactionStart;G.reactionState='wait';if(ms<G.reactionBest){G.reactionBest=ms;if(ms<350)unlockA('reaction_fast');}go('reaction');const el=document.getElementById('rx-res');if(el){el.textContent=ms+'ms';el.style.color=ms<300?'var(--green)':ms<500?'var(--yellow)':'var(--redl)';}addXP(5);addCoins(3);}}

/* ===== COULEURS ===== */
const CN={Rouge:[220,50,50],Bleu:[50,100,220],Vert:[50,200,80],Jaune:[230,210,50],Orange:[230,130,50],Violet:[130,50,220],Rose:[220,80,160],Cyan:[50,210,210]};
function renderColor(){const{r,g,b,name}=G.colorTarget.r?G.colorTarget:{r:128,g:128,b:128,name:''};return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--purplel)">Score: <span id="col-s">${G.colorScore}</span></span><button class="btn btn-purple btn-sm" onclick="initColor()">🔀 Nouvelle</button></div><div style="width:100%;height:80px;border-radius:var(--rad-lg);margin-bottom:14px;background:rgb(${r},${g},${b})"></div><div style="font-size:14px;font-weight:800;text-align:center;color:var(--text2);margin-bottom:12px">Quelle couleur est-ce ?</div><div id="col-opts" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div><div id="col-fb" style="text-align:center;margin-top:10px;font-weight:800;min-height:22px"></div></div>`;}
function initColor(){const names=Object.keys(CN);const pick=names[rng(0,names.length-1)];const[r,g,b]=CN[pick];G.colorTarget={r:r+rng(-15,15),g:g+rng(-15,15),b:b+rng(-15,15),name:pick};const w=names.filter(n=>n!==pick).sort(()=>Math.random()-.5).slice(0,3);const opts=[pick,...w].sort(()=>Math.random()-.5);go('color');setTimeout(()=>{const el=document.getElementById('col-opts');if(el)el.innerHTML=opts.map((o,i)=>`<button class="qopt" id="clo-${i}" onclick="answerColor('${o}')">${o}</button>`).join('');},30);}
function answerColor(ans){const fb=document.getElementById('col-fb');if(!fb)return;if(ans===G.colorTarget.name){G.colorScore++;G.colorFoundCount++;const s=document.getElementById('col-s');if(s)s.textContent=G.colorScore;fb.textContent='✅ Correct ! +5 🪙';fb.style.color='var(--green)';addCoins(5);addXP(5);if(G.colorFoundCount>=10)unlockA('color_10');}else{fb.textContent='❌ C\'était '+G.colorTarget.name;fb.style.color='var(--redl)';}document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);setTimeout(initColor,1100);}

/* ===== WHACK A MOLE ===== */
function renderWhack(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:20px;color:var(--green)">Score: <span id="wk-s">${G.whackScore}</span></span><span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('whack')}</span></span><span style="font-size:14px;font-weight:800;color:var(--orange)">⏱ <span id="wk-t">30</span>s</span></div><div id="wk-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:0 auto"></div><div style="text-align:center;margin-top:12px"><button class="btn btn-green" style="color:#000" onclick="startWhack()">▶ Start</button></div>`;}
function initWhack(){G.whackMoles=Array(9).fill(false);G.whackScore=0;renderWhackGrid();}
function renderWhackGrid(){const g=document.getElementById('wk-grid');if(!g)return;g.innerHTML=G.whackMoles.map((m,i)=>`<div style="height:78px;border-radius:var(--rad-lg);background:${m?'rgba(90,240,127,.15)':'var(--bg3)'};border:2px solid ${m?'var(--green)':'rgba(127,90,240,.2)'};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:${m?'38':'28'}px;transition:all .15s" onclick="whackM(${i})">${m?'🦔':'🌿'}</div>`).join('');}
function startWhack(){clearInterval(G.whackIv);if(window._wkIv)clearInterval(window._wkIv);G.whackScore=0;G.whackMoles=Array(9).fill(false);G.whackRunning=true;let t=30;const sc=document.getElementById('wk-s');if(sc)sc.textContent=0;const ti=document.getElementById('wk-t');if(ti)ti.textContent=t;G.whackIv=setInterval(()=>{G.whackMoles=G.whackMoles.map(()=>Math.random()<.28);renderWhackGrid();},700);window._wkIv=setInterval(()=>{t--;if(ti)ti.textContent=t;if(t<=0){clearInterval(G.whackIv);clearInterval(window._wkIv);G.whackRunning=false;G.whackMoles=Array(9).fill(false);renderWhackGrid();if(setRecord('whack',G.whackScore))toast('🦔 Record: '+G.whackScore+'!','green');toast('Score: '+G.whackScore,'purple');if(G.whackScore>=20)unlockA('whack_20');addXP(Math.floor(G.whackScore/2));addCoins(G.whackScore);}},1000);}
function whackM(i){if(!G.whackRunning||!G.whackMoles[i])return;G.whackMoles[i]=false;G.whackScore++;const sc=document.getElementById('wk-s');if(sc)sc.textContent=G.whackScore;renderWhackGrid();addXP(1);}

/* ===== PFC ===== */
const PFC_R={pierre:'ciseaux',feuille:'pierre',ciseaux:'feuille'};
const PFC_I={pierre:'🪨',feuille:'📄',ciseaux:'✂️'};
function renderPFC(){return `<div class="grid-3" style="margin-bottom:14px"><div class="stat" style="background:rgba(90,240,127,.08);border-color:rgba(90,240,127,.3)"><div class="stat-val" style="color:var(--green)">${G.pfcWins}</div><div class="stat-label" style="color:var(--text2)">Victoires</div></div><div class="stat" style="background:rgba(240,208,90,.08);border-color:rgba(240,208,90,.3)"><div class="stat-val" style="color:var(--yellow)">${G.pfcDraws}</div><div class="stat-label" style="color:var(--text2)">Égalités</div></div><div class="stat" style="background:rgba(240,90,90,.08);border-color:rgba(240,90,90,.3)"><div class="stat-val" style="color:var(--redl)">${G.pfcLosses}</div><div class="stat-label" style="color:var(--text2)">Défaites</div></div></div><div class="card" style="text-align:center"><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">${['pierre','feuille','ciseaux'].map(c=>`<button class="pfc-btn" onclick="playPFC('${c}')">${PFC_I[c]}<div style="font-size:11px;font-weight:800;color:var(--text2);margin-top:3px">${c}</div></button>`).join('')}</div><div class="fredoka" id="pfc-r" style="font-size:22px;min-height:30px;color:var(--yellow)">Choisis !</div><div style="font-size:13px;color:var(--text2);margin-top:6px" id="pfc-d"></div></div>`;}
function playPFC(c){const choices=['pierre','feuille','ciseaux'];const cpu=choices[rng(0,2)];const r=document.getElementById('pfc-r');const d=document.getElementById('pfc-d');if(!r)return;d.textContent='Toi: '+PFC_I[c]+' vs IA: '+PFC_I[cpu];if(c===cpu){r.textContent='🤝 Égalité !';r.style.color='var(--yellow)';G.pfcDraws++;}else if(PFC_R[c]===cpu){r.textContent='🎉 Tu gagnes !';r.style.color='var(--green)';G.pfcWins++;addCoins(5);addXP(5);if(G.pfcWins>=5)unlockA('pfc_5');}else{r.textContent='💀 Tu perds !';r.style.color='var(--redl)';G.pfcLosses++;}}

/* ===== PILE OU FACE ===== */
function renderCoin(){return `<div class="card" style="text-align:center;padding:24px"><div class="fredoka" style="font-size:20px;color:var(--yellow);margin-bottom:16px">🪙 Pile ou Face</div><div id="coin-res" style="font-size:72px;margin-bottom:20px;transition:all .3s">🪙</div><button class="btn btn-yellow" style="color:#000;font-size:16px;padding:12px 28px" onclick="flipCoin()">Lancer !</button><div class="grid-2" style="margin-top:20px"><div class="stat" style="background:rgba(127,90,240,.1);border-color:rgba(127,90,240,.3)"><div class="stat-val" style="color:var(--purplel)">${G.coinFlips.heads}</div><div class="stat-label" style="color:var(--text2)">Pile 🪙</div></div><div class="stat" style="background:rgba(240,147,90,.1);border-color:rgba(240,147,90,.3)"><div class="stat-val" style="color:var(--orangel)">${G.coinFlips.tails}</div><div class="stat-label" style="color:var(--text2)">Face 🔮</div></div></div><div style="font-size:12px;color:var(--text3);margin-top:10px">Total: ${G.coinFlips.heads+G.coinFlips.tails} lancers</div></div>`;}
function flipCoin(){const el=document.getElementById('coin-res');if(!el)return;el.style.transform='scale(0)';setTimeout(()=>{const isHead=Math.random()<0.5;if(isHead){G.coinFlips.heads++;el.textContent='🪙';}else{G.coinFlips.tails++;el.textContent='🔮';}el.style.transform='scale(1)';addXP(1);},300);}

/* ===== DESSIN ===== */
function renderDessin(){return `<div class="card" style="padding:12px"><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px" id="cpicker">${['#f05a5a','#f0935a','#f0d05a','#5af07f','#5af0e0','#5ab4f0','#7f5af0','#f05af0','#fff','#333'].map((c,i)=>`<div class="cdot ${i===4?'active':''}" style="background:${c}" onclick="setDc('${c}',this)"></div>`).join('')}</div><div style="display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap"><label style="font-size:12px;color:var(--text2);font-weight:700">Taille:</label><input type="range" min="2" max="40" value="8" style="width:85px;background:transparent" id="bs-sl" oninput="setBs(this.value)"><span id="bs-v" style="font-size:12px;color:var(--purplel);font-weight:700">8px</span><button class="btn btn-sm" onclick="setEr()" id="er-btn">⬜ Gomme</button><button class="btn btn-sm btn-red" onclick="clDraw()">🗑️ Effacer</button><button class="btn btn-sm btn-purple" onclick="svDraw()">💾 Sauver</button></div><canvas id="dc" width="500" height="320" style="max-width:100%;cursor:crosshair;background:#fff;border:2px solid rgba(127,90,240,.3)"></canvas></div>`;}
function initDraw(){const cv=document.getElementById('dc');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);let draw=false,color='#5af0e0',size=8,eraser=false;function pos(e){const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};}function start(e){draw=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}function move(e){if(!draw)return;const p=pos(e);ctx.lineWidth=eraser?size*2:size;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=eraser?'#fff':color;ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',()=>draw=false);cv.addEventListener('mouseleave',()=>draw=false);cv.addEventListener('touchstart',e=>{e.preventDefault();start(e);},{passive:false});cv.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});cv.addEventListener('touchend',()=>draw=false);window._dc={setColor:c=>{color=c;eraser=false;},setSize:s=>size=s,setEraser:()=>eraser=true,clear:()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);},getCv:()=>cv};window._dcClean=()=>{draw=false;};}
function setDc(c,el){document.querySelectorAll('#cpicker .cdot').forEach(d=>d.classList.remove('active'));el.classList.add('active');if(window._dc)window._dc.setColor(c);}
function setBs(v){const el=document.getElementById('bs-v');if(el)el.textContent=v+'px';if(window._dc)window._dc.setSize(parseInt(v));}
function setEr(){if(window._dc)window._dc.setEraser();const b=document.getElementById('er-btn');if(b)b.style.borderColor='var(--cyan)';}
function clDraw(){if(window._dc)window._dc.clear();}
function svDraw(){if(window._dc){const a=document.createElement('a');a.download='dessin.png';a.href=window._dc.getCv().toDataURL();a.click();toast('🎨 Dessin sauvegardé !','purple');}}

/* ===== ANIMAL VIRTUEL ===== */
const CAT_PETS=['🐱','🐶','🐰','🦊','🐼','🦄','🐸'];let catPetIdx=0;
function renderCat(){const avg=Math.round((G.catFeed+G.catHappy+G.catEnergy)/3);return `<div class="card"><div class="card-title">🐱 Mon Animal Virtuel</div><div style="text-align:center;padding:10px 0 14px"><div style="font-size:70px;cursor:pointer;user-select:none;margin-bottom:8px" onclick="catPat()" title="Câliner">${CAT_PETS[catPetIdx]}</div><div style="font-size:15px;font-weight:800">Mochi</div><div style="font-size:13px;color:var(--text2);margin-top:3px">${avg>80?'Content et plein d\'énergie ! 😺':avg>60?'Ça pourrait aller mieux...':'Un peu triste, câline-moi ! 😿'}</div></div><div class="grid-3" style="margin-bottom:14px"><div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">🍎 Faim</div><div class="prog" style="height:9px"><div class="prog-fill" style="width:${G.catFeed}%;background:var(--green)"></div></div><div style="font-size:11px;color:var(--text3);margin-top:2px">${G.catFeed}%</div></div><div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">💕 Bonheur</div><div class="prog" style="height:9px"><div class="prog-fill" style="width:${G.catHappy}%;background:var(--pink)"></div></div><div style="font-size:11px;color:var(--text3);margin-top:2px">${G.catHappy}%</div></div><div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">⚡ Énergie</div><div class="prog" style="height:9px"><div class="prog-fill" style="width:${G.catEnergy}%;background:var(--yellow)"></div></div><div style="font-size:11px;color:var(--text3);margin-top:2px">${G.catEnergy}%</div></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-green" style="color:#000" onclick="feedCat()">🍎 Nourrir</button><button class="btn btn-pink" onclick="playCat()">🎾 Jouer</button><button class="btn" style="background:var(--cal);color:var(--cad);border-color:var(--ca)" onclick="sleepCat()">😴 Dormir</button><button class="btn" onclick="changeCat()"><i style="font-size:13px">🔀</i> Changer</button></div></div>`;}
function initCat(){if(G.catIv)clearInterval(G.catIv);G.catIv=setInterval(()=>{G.catFeed=Math.max(0,G.catFeed-1);G.catHappy=Math.max(0,G.catHappy-0.5);G.catEnergy=Math.max(0,G.catEnergy-0.3);},30000);}
function feedCat(){G.catFeed=Math.min(100,G.catFeed+20);addCoins(1);go('cat');toast('😋 Miam miam !','green');}
function playCat(){G.catHappy=Math.min(100,G.catHappy+20);addCoins(1);go('cat');toast('🎉 Woohoo !','pink');}
function sleepCat(){G.catEnergy=Math.min(100,G.catEnergy+30);go('cat');toast('😴 Zzz...','yellow');}
function changeCat(){catPetIdx=(catPetIdx+1)%CAT_PETS.length;go('cat');}
function catPat(){const e=document.querySelector('.card div[onclick="catPat()"]');if(e){e.style.transform='scale(1.25)';setTimeout(()=>e.style.transform='',200);}toast('Ronron... 💕','pink');}

/* ===== COLLECTION ===== */
const RAR_B={Commune:'badge-cyan',Rare:'badge-purple',Épique:'badge-pink',Légendaire:'badge-yellow'};
function renderCollection(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--purplel)">${G.collection.filter(c=>c.owned).length}/${G.collection.length} objets</span><div class="coin-chip">🪙 ${G.coins}</div></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px">${G.collection.map((c,i)=>`<div class="coll-card ${c.owned?'':'locked'}" onclick="${!c.owned&&c.cost<=G.coins?'buyColl('+i+')':''}" title="${c.owned?'Possédé':'Cliquer pour acheter'}">${!c.owned?'<div style="position:absolute;top:5px;right:6px;font-size:12px">🔒</div>':''}<div style="font-size:34px;margin-bottom:6px">${c.icon}</div><div style="font-weight:800;font-size:12px;margin-bottom:5px">${c.name}</div><span class="badge ${RAR_B[c.rarity]||'badge-purple'}" style="font-size:10px">${c.rarity}</span>${!c.owned?'<div style="font-size:12px;color:var(--yellow);margin-top:7px;font-weight:800">'+c.cost+' 🪙</div>':''}</div>`).join('')}</div>`;}
function buyColl(i){const c=G.collection[i];if(G.coins>=c.cost&&!c.owned){G.coins-=c.cost;c.owned=true;updateTop();go('collection');toast('🎉 "'+c.name+'" obtenu !','yellow');}else toast('Pas assez de pièces !','red');}

/* ===== TROPHÉES ===== */
function renderTrophees(){const un=G.achievements.filter(a=>a.unlocked).length;return `<div class="card" style="text-align:center;padding:18px;background:rgba(240,208,90,.07);border-color:rgba(240,208,90,.3)"><div style="font-size:44px">🏆</div><div class="fredoka" style="font-size:22px;color:var(--yellow);margin-top:7px">${un} / ${G.achievements.length}</div><div class="prog" style="max-width:180px;margin:10px auto;height:10px"><div class="prog-fill" style="width:${pct(un,G.achievements.length)}%;background:linear-gradient(90deg,var(--yellow),var(--orange))"></div></div></div>${G.achievements.map(a=>`<div class="achiev ${a.unlocked?'unlocked':''}"><div style="font-size:26px;width:42px;text-align:center">${a.unlocked?a.icon:'🔒'}</div><div style="flex:1"><div style="font-weight:800;font-size:13px;color:${a.unlocked?'var(--yellow)':'var(--text)'}">${a.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${a.desc}</div></div>${a.unlocked?'<span class="badge badge-yellow">+'+a.xp+' XP</span>':'<span class="badge" style="background:rgba(255,255,255,.05);color:var(--text3)">Verrouillé</span>'}</div>`).join('')}`;};

/* ===== ÉTOILES ===== */
function initStars(){const c=document.getElementById('stars-bg');for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s`;c.appendChild(s);}}

/* ===== INIT ===== */
initStars();
buildNav();
go('home');
G.balanceTarget=rng(10,50);
initWordleData();
</script>
