<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--bg2:#161628;--bg3:#1e1e35;--bg4:#252540;
  --text:#f0eeff;--text2:#aaa8cc;--text3:#6662aa;
  --purple:#7f5af0;--purplel:#a78bfa;--purpled:#4c35b8;
  --pink:#f05af0;--pinkl:#f5b8f5;
  --cyan:#5af0e0;--cyanl:#a0f5ed;--cyand:#1a7a70;
  --yellow:#f0d05a;--yellowl:#f5e4a0;--yellowd:#7a6410;
  --green:#5af07f;--greenl:#a0f5b5;--greend:#1a7a3a;
  --red:#f05a5a;--redl:#f5a0a0;
  --orange:#f0935a;--orangel:#f5c4a0;
  --rad:12px;--rad-lg:18px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.fredoka{font-family:'Fredoka One',cursive}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,2s) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.1;transform:scale(.8)}to{opacity:.9;transform:scale(1.2)}}
.shell{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden}
.sidebar{width:68px;background:var(--bg2);border-right:1px solid rgba(127,90,240,.2);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0;overflow-y:auto}
.logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:6px;cursor:pointer;transition:transform .2s;flex-shrink:0}
.logo:hover{transform:scale(1.1) rotate(-3deg)}
.nav-btn{width:58px;height:50px;border-radius:10px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .2s;color:var(--text3);font-size:8px;font-family:'Nunito',sans-serif;font-weight:700;padding:0;flex-shrink:0}
.nav-btn .ic{font-size:19px;transition:transform .2s;line-height:1}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn:hover .ic{transform:scale(1.2)}
.nav-btn.active{background:rgba(127,90,240,.15);color:var(--purplel);border:1px solid rgba(127,90,240,.3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid rgba(127,90,240,.15);flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--purplel);flex:1;min-width:80px}
.xp-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid rgba(127,90,240,.3);border-radius:20px;padding:5px 11px}
.xp-bar-mini{width:65px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.xp-fill-mini{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:3px;transition:width .5s}
.coin-chip{display:flex;align-items:center;gap:5px;background:rgba(240,208,90,.1);border:1px solid rgba(240,208,90,.3);border-radius:20px;padding:5px 11px;font-weight:800;color:var(--yellow);font-size:13px}
.page{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--bg2);border:1px solid rgba(127,90,240,.15);border-radius:var(--rad-lg);padding:16px;margin-bottom:14px}
.card-title{font-family:'Fredoka One',cursive;font-size:15px;color:var(--purplel);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{border-radius:var(--rad);padding:12px;text-align:center;border:1px solid transparent}
.stat-val{font-family:'Fredoka One',cursive;font-size:24px}
.stat-label{font-size:11px;font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.btn{padding:7px 13px;border-radius:var(--rad);border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px);filter:brightness(1.15)}
.btn:active{transform:scale(.97)}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 0 14px rgba(127,90,240,.35)}
.btn-cyan{background:var(--cyan);border-color:var(--cyan);color:#000}
.btn-pink{background:var(--pink);border-color:var(--pink);color:#fff}
.btn-yellow{background:var(--yellow);border-color:var(--yellow);color:#000}
.btn-green{background:var(--green);border-color:var(--green);color:#000}
.btn-red{background:var(--red);border-color:var(--red);color:#fff}
.btn-orange{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:33px;height:33px;padding:0;justify-content:center;font-size:16px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:800;display:inline-block}
.badge-purple{background:rgba(127,90,240,.2);color:var(--purplel);border:1px solid rgba(127,90,240,.3)}
.badge-cyan{background:rgba(90,240,224,.2);color:var(--cyan);border:1px solid rgba(90,240,224,.3)}
.badge-pink{background:rgba(240,90,240,.2);color:var(--pinkl);border:1px solid rgba(240,90,240,.3)}
.badge-yellow{background:rgba(240,208,90,.2);color:var(--yellow);border:1px solid rgba(240,208,90,.3)}
.badge-green{background:rgba(90,240,127,.2);color:var(--green);border:1px solid rgba(90,240,127,.3)}
.badge-red{background:rgba(240,90,90,.2);color:var(--redl);border:1px solid rgba(240,90,90,.3)}
.badge-orange{background:rgba(240,147,90,.2);color:var(--orangel);border:1px solid rgba(240,147,90,.3)}
.prog{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(127,90,240,.1)}
.row:last-child{border-bottom:none}
input,select,textarea{background:var(--bg3);border:1px solid rgba(127,90,240,.2);border-radius:var(--rad);padding:8px 11px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:70px}
.toasts{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{background:var(--bg2);border:1px solid rgba(127,90,240,.4);border-radius:var(--rad);padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);box-shadow:0 0 14px rgba(127,90,240,.2);display:flex;align-items:center;gap:7px;transform:translateX(120%);transition:transform .3s;min-width:200px;pointer-events:none}
.toast.show{transform:translateX(0)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid rgba(127,90,240,.4);border-radius:var(--rad-lg);padding:20px;width:90%;max-width:440px;box-shadow:0 0 28px rgba(127,90,240,.2)}
.modal-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--purplel);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:12px}
.game-tile{border-radius:var(--rad-lg);padding:13px;text-align:center;border:1px solid rgba(127,90,240,.2);background:var(--bg3);cursor:pointer;transition:all .2s}
.game-tile:hover{transform:translateY(-3px);border-color:var(--purple);box-shadow:0 0 14px rgba(127,90,240,.2)}
.game-tile .icon{font-size:30px;display:block;margin-bottom:5px}
.game-tile .name{font-size:11px;font-weight:800;color:var(--text)}
.game-tile .rec{font-size:10px;color:var(--text3);margin-top:2px}
canvas{display:block;border-radius:var(--rad)}
.qopt{display:block;width:100%;padding:10px 14px;border-radius:var(--rad);border:1px solid rgba(127,90,240,.25);background:var(--bg3);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:all .2s;margin-bottom:7px}
.qopt:hover:not(:disabled){border-color:var(--purple);background:rgba(127,90,240,.1);transform:translateX(4px)}
.qopt.correct{border-color:var(--green);background:rgba(90,240,127,.15);color:var(--green)}
.qopt.wrong{border-color:var(--red);background:rgba(240,90,90,.15);color:var(--redl)}
.mem-card{aspect-ratio:1;border-radius:var(--rad);border:2px solid rgba(127,90,240,.3);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;user-select:none;font-size:28px}
.mem-card.flipped,.mem-card.matched{background:rgba(127,90,240,.15);border-color:var(--purple)}
.mem-card.matched{border-color:var(--green);background:rgba(90,240,127,.1)}
.mem-card:not(.flipped):not(.matched) span{visibility:hidden}
.clicker-big{width:140px;height:140px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));cursor:pointer;font-size:52px;transition:all .1s;box-shadow:0 0 28px rgba(127,90,240,.4);display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative}
.clicker-big:active{transform:scale(.92);box-shadow:none}
.clicker-big:hover{transform:scale(1.05)}
.float-num{position:absolute;font-family:'Fredoka One',cursive;font-size:20px;color:var(--yellow);pointer-events:none;animation:floatUp .9s ease-out forwards;z-index:10}
@keyframes floatUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-55px)}}
.pfc-btn{font-size:40px;padding:12px 18px;border-radius:var(--rad-lg);border:2px solid rgba(127,90,240,.3);background:var(--bg3);cursor:pointer;transition:all .2s;min-width:85px;text-align:center}
.pfc-btn:hover{border-color:var(--purple);transform:scale(1.1);box-shadow:0 0 14px rgba(127,90,240,.3)}
.achiev{border-radius:var(--rad-lg);padding:12px;display:flex;align-items:center;gap:11px;margin-bottom:9px;border:1px solid rgba(127,90,240,.15)}
.achiev.unlocked{background:rgba(240,208,90,.07);border-color:rgba(240,208,90,.3)}
.coll-card{border-radius:var(--rad-lg);padding:12px;text-align:center;border:1px solid rgba(127,90,240,.2);background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.coll-card:hover{transform:translateY(-3px);border-color:var(--purple);box-shadow:0 0 14px rgba(127,90,240,.2)}
.coll-card.locked{filter:grayscale(.75);opacity:.55;cursor:default}
.coll-card.locked:hover{transform:none;box-shadow:none}
.ttt-cell{width:76px;height:76px;border-radius:var(--rad);background:var(--bg3);border:2px solid rgba(127,90,240,.3);cursor:pointer;font-family:'Fredoka One',cursive;font-size:34px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.ttt-cell:hover:not(.used){background:rgba(127,90,240,.15);border-color:var(--purple)}
.ttt-cell.win-cell{background:rgba(90,240,127,.2);border-color:var(--green)}
.t48-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;background:rgba(127,90,240,.12);padding:10px;border-radius:var(--rad-lg);max-width:300px;margin:0 auto}
.t48-cell{height:64px;border-radius:var(--rad);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:20px;transition:background .2s}
.kb{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:11px}
.key{padding:6px 9px;border-radius:8px;border:1px solid rgba(127,90,240,.3);background:var(--bg3);color:var(--text);font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;min-width:30px;text-align:center;transition:all .15s}
.key:hover:not(:disabled){background:rgba(127,90,240,.2);border-color:var(--purple)}
.key:disabled{opacity:.35;cursor:default}
.key.k-hit{background:rgba(90,240,127,.2);border-color:var(--green);color:var(--green)}
.key.k-partial{background:rgba(240,208,90,.2);border-color:var(--yellow);color:var(--yellow)}
.key.k-miss{background:rgba(240,90,90,.1);border-color:rgba(240,90,90,.3);color:var(--redl)}
.w-cell{width:42px;height:42px;border-radius:7px;border:2px solid rgba(127,90,240,.3);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:20px;background:var(--bg3);transition:all .3s}
.w-cell.hit{background:rgba(90,240,127,.2);border-color:var(--green);color:var(--green)}
.w-cell.partial{background:rgba(240,208,90,.2);border-color:var(--yellow);color:var(--yellow)}
.w-cell.miss{background:rgba(127,90,240,.07);border-color:rgba(127,90,240,.15);color:var(--text3)}
.cdot{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.cdot:hover,.cdot.active{border-color:#fff;transform:scale(1.2)}
.letter-box{width:36px;height:40px;border:2px solid rgba(127,90,240,.4);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;color:var(--purplel);background:var(--bg3)}
.letter-box.hit{background:rgba(90,240,127,.15);border-color:var(--green);color:var(--green)}
.letter-box.miss-l{background:rgba(240,90,90,.1);border-color:var(--red);color:var(--redl)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.bounce{animation:bounce 1.5s ease-in-out infinite}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(127,90,240,.3);border-radius:2px}
</style>
</head>

function pct(a,b){return b?Math.round(a/b*100):0;}
function addXP(n){G.xp+=n;while(G.xp>=100){G.level++;G.xp-=100;toast('🎉 Niveau '+G.level+' !','yellow');}if(G.level>=5)unlockA('level_5');updateTop();}
function addCoins(n){G.coins+=n;if(G.coins>=200)unlockA('coins_200');updateTop();}
function updateTop(){
  document.getElementById('top-level').textContent=G.level;
  document.getElementById('top-xp').style.width=G.xp+'%';
  document.getElementById('top-xp-txt').textContent=G.xp+'/100';
  document.getElementById('top-coins').textContent=G.coins;
}
function setRecord(k,v){if(!G.records[k]||v>G.records[k]){G.records[k]=v;return true;}return false;}
function getRecord(k){return G.records[k]||0;}
function toast(msg,color='purple'){
  const cols={purple:'rgba(127,90,240,.6)',yellow:'rgba(240,208,90,.6)',green:'rgba(90,240,127,.6)',red:'rgba(240,90,90,.6)',cyan:'rgba(90,240,224,.6)',pink:'rgba(240,90,240,.6)'};
  const el=document.createElement('div');el.className='toast';el.style.borderColor=cols[color]||cols.purple;el.innerHTML=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},2800);
}
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-ov').classList.add('open');}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');}

const SN_C=18,SN_R=14,SN_SZ=20;
function renderSnake(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--cyan)">Score: <span id="sn-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('snake')}</span></span></div><canvas id="sn-cv" width="${SN_C*SN_SZ}" height="${SN_R*SN_SZ}" style="max-width:100%;margin:0 auto;border:2px solid rgba(90,240,224,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap"><button class="btn btn-cyan" style="color:#000" onclick="startSnake()">▶ Start</button><button class="btn" onclick="stopSn()">⏹</button></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">← ↑ → ↓</p>`;}
function stopSn(){clearInterval(G.snakeIv);G.snakeRunning=false;}
function initSnake(){drawSn();}
function startSnake(){stopSn();G.snakeBody=[{x:5,y:5},{x:4,y:5},{x:3,y:5}];G.snakeDir={x:1,y:0};G.snakeScore=0;placeSnakeFood();G.snakeRunning=true;G.snakeIv=setInterval(tickSn,130);const el=document.getElementById('sn-s');if(el)el.textContent=0;}
function placeSnakeFood(){do{G.snakeFood={x:rng(0,SN_C-1),y:rng(0,SN_R-1)};}while(G.snakeBody.some(s=>s.x===G.snakeFood.x&&s.y===G.snakeFood.y));}
function tickSn(){const h={x:G.snakeBody[0].x+G.snakeDir.x,y:G.snakeBody[0].y+G.snakeDir.y};if(h.x<0||h.x>=SN_C||h.y<0||h.y>=SN_R||G.snakeBody.some(s=>s.x===h.x&&s.y===h.y)){stopSn();if(setRecord('snake',G.snakeScore))toast('🐍 Record: '+G.snakeScore+'!','cyan');if(G.snakeScore>=10)unlockA('snake_10');toast('💀 Score: '+G.snakeScore,'red');return;}G.snakeBody.unshift(h);if(h.x===G.snakeFood.x&&h.y===G.snakeFood.y){G.snakeScore++;const el=document.getElementById('sn-s');if(el)el.textContent=G.snakeScore;addXP(2);addCoins(1);placeSnakeFood();}else G.snakeBody.pop();drawSn();}
function drawSn(){const cv=document.getElementById('sn-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#161628';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(127,90,240,.06)';ctx.lineWidth=1;for(let x=0;x<=SN_C;x++){ctx.beginPath();ctx.moveTo(x*SN_SZ,0);ctx.lineTo(x*SN_SZ,SN_R*SN_SZ);ctx.stroke();}for(let y=0;y<=SN_R;y++){ctx.beginPath();ctx.moveTo(0,y*SN_SZ);ctx.lineTo(SN_C*SN_SZ,y*SN_SZ);ctx.stroke();}ctx.font=(SN_SZ-2)+'px serif';ctx.fillText('🍎',G.snakeFood.x*SN_SZ+1,G.snakeFood.y*SN_SZ+SN_SZ-2);G.snakeBody.forEach((s,i)=>{ctx.fillStyle=i===0?'#5af0e0':`rgba(90,240,224,${Math.max(.2,1-i*.06)})`;ctx.shadowColor='#5af0e0';ctx.shadowBlur=i===0?10:0;ctx.beginPath();ctx.roundRect(s.x*SN_SZ+1,s.y*SN_SZ+1,SN_SZ-2,SN_SZ-2,3);ctx.fill();});ctx.shadowBlur=0;if(!G.snakeRunning&&G.snakeScore===0){ctx.fillStyle='rgba(90,240,224,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Appuie Start !',cv.width/2,cv.height/2);ctx.textAlign='left';}}
document.addEventListener('keydown',e=>{if(!G.snakeRunning)return;const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};const nd=m[e.key];if(nd&&!(nd.x===-G.snakeDir.x&&nd.y===-G.snakeDir.y)){G.snakeDir=nd;e.preventDefault();}});

/* ===== DINO ===== */
const DN_W=460,DN_H=140,DN_GND=105,DN_X=50;
function renderDino(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--cyanl)">Score: <span id="dn-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('dino')}</span></span></div><canvas id="dn-cv" width="${DN_W}" height="${DN_H}" style="max-width:100%;margin:0 auto;background:var(--bg3);border:2px solid rgba(90,240,224,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap"><button class="btn btn-cyan" style="color:#000" onclick="startDino()">▶ Start</button><button class="btn btn-yellow" style="color:#000" onclick="dinJump()">⬆ Sauter</button></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">Espace pour sauter</p>`;}
function stopDino(){clearInterval(G.dinoIv);G.dinoRunning=false;}
function initDino(){drawDino();}
function startDino(){stopDino();G.dinoY=DN_GND;G.dinoVY=0;G.dinoObs=[];G.dinoScore=0;G.dinoRunning=true;let f=0;G.dinoIv=setInterval(()=>{f++;G.dinoVY+=1.3;G.dinoY+=G.dinoVY;if(G.dinoY>=DN_GND){G.dinoY=DN_GND;G.dinoVY=0;}if(f%55===0)G.dinoObs.push({x:DN_W,h:25+rng(0,35)});const spd=5+Math.floor(G.dinoScore/80);G.dinoObs.forEach(o=>o.x-=spd);G.dinoObs=G.dinoObs.filter(o=>o.x>-30);G.dinoScore++;const el=document.getElementById('dn-s');if(el)el.textContent=G.dinoScore;for(const o of G.dinoObs){if(DN_X+26>o.x&&DN_X<o.x+18&&G.dinoY-26<DN_GND+30&&G.dinoY>DN_GND+30-o.h){stopDino();if(setRecord('dino',G.dinoScore))toast('🦕 Record: '+G.dinoScore+'!','cyan');if(G.dinoScore>=50)unlockA('dino_50');toast('💥 Score: '+G.dinoScore,'red');addXP(Math.floor(G.dinoScore/10));return;}}drawDino();},50);}
function dinJump(){if(G.dinoRunning&&G.dinoY>=DN_GND){G.dinoVY=-13;}}
document.addEventListener('keydown',e=>{if(e.code==='Space'&&G.dinoRunning){e.preventDefault();dinJump();}});
function drawDino(){const cv=document.getElementById('dn-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#1e1e35';ctx.fillRect(0,0,DN_W,DN_H);ctx.strokeStyle='rgba(90,240,224,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,DN_GND+30);ctx.lineTo(DN_W,DN_GND+30);ctx.stroke();ctx.font='26px serif';ctx.fillText('🦕',DN_X-10,G.dinoY+7);ctx.fillStyle='#f05a5a';ctx.shadowColor='#f05a5a';ctx.shadowBlur=6;G.dinoObs.forEach(o=>{ctx.beginPath();ctx.roundRect(o.x,DN_GND+30-o.h,18,o.h,3);ctx.fill();});ctx.shadowBlur=0;if(!G.dinoRunning&&G.dinoScore===0){ctx.fillStyle='rgba(90,240,224,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Start !',DN_W/2,DN_H/2);ctx.textAlign='left';}}

/* ===== PONG ===== */
const PG_W=460,PG_H=250,PG_PH=60,PG_PW=10;
function renderPong(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--pink)">Score: <span id="pg-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('pong')}</span></span></div><canvas id="pg-cv" width="${PG_W}" height="${PG_H}" style="max-width:100%;margin:0 auto;background:var(--bg3);border:2px solid rgba(240,90,240,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap"><button class="btn btn-pink" onclick="startPong()">▶ Start</button><button class="btn" onclick="stopPong()">⏹</button></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">Bouge la souris / le doigt sur le canvas</p>`;}
function stopPong(){clearInterval(G.pongIv);G.pongRunning=false;}
function initPong(){const cv=document.getElementById('pg-cv');if(!cv)return;cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();G.pongPaddle.y=clamp((e.clientY-r.top)*(PG_H/r.height)-PG_PH/2,0,PG_H-PG_PH);});cv.addEventListener('touchmove',e=>{e.preventDefault();const r=cv.getBoundingClientRect();G.pongPaddle.y=clamp((e.touches[0].clientY-r.top)*(PG_H/r.height)-PG_PH/2,0,PG_H-PG_PH);},{passive:false});drawPong();}
function startPong(){stopPong();G.pongBall={x:PG_W/2,y:PG_H/2,vx:4,vy:3};G.pongPaddle={y:(PG_H-PG_PH)/2};G.pongCpu={y:(PG_H-PG_PH)/2};G.pongScore=0;G.pongRunning=true;G.pongIv=setInterval(()=>{const b=G.pongBall;b.x+=b.vx;b.y+=b.vy;if(b.y<=0||b.y>=PG_H)b.vy*=-1;if(b.x>=PG_W-22&&b.x<=PG_W-12&&b.y>=G.pongPaddle.y&&b.y<=G.pongPaddle.y+PG_PH){b.vx*=-1.05;b.vy+=(b.y-G.pongPaddle.y-PG_PH/2)*0.1;G.pongScore++;const el=document.getElementById('pg-s');if(el)el.textContent=G.pongScore;addXP(1);addCoins(1);if(G.pongScore>=5)unlockA('pong_5');}const cc=G.pongCpu.y+PG_PH/2;if(cc<b.y-4)G.pongCpu.y+=3;else if(cc>b.y+4)G.pongCpu.y-=3;G.pongCpu.y=clamp(G.pongCpu.y,0,PG_H-PG_PH);if(b.x<=22&&b.y>=G.pongCpu.y&&b.y<=G.pongCpu.y+PG_PH)b.vx*=-1;if(b.x<0||b.x>PG_W){stopPong();if(setRecord('pong',G.pongScore))toast('🏓 Record Pong: '+G.pongScore+'!','pink');toast('Score final: '+G.pongScore,'purple');addXP(G.pongScore);addCoins(G.pongScore*2);}drawPong();},16);}
function drawPong(){const cv=document.getElementById('pg-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#1e1e35';ctx.fillRect(0,0,PG_W,PG_H);ctx.setLineDash([8,8]);ctx.strokeStyle='rgba(127,90,240,.3)';ctx.beginPath();ctx.moveTo(PG_W/2,0);ctx.lineTo(PG_W/2,PG_H);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#f05af0';ctx.shadowColor='#f05af0';ctx.shadowBlur=8;ctx.beginPath();ctx.roundRect(PG_W-22,G.pongPaddle.y,PG_PW,PG_PH,4);ctx.fill();ctx.fillStyle='#7f5af0';ctx.shadowColor='#7f5af0';ctx.beginPath();ctx.roundRect(12,G.pongCpu.y,PG_PW,PG_PH,4);ctx.fill();ctx.fillStyle='#f0d05a';ctx.shadowColor='#f0d05a';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(G.pongBall.x,G.pongBall.y,8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;if(!G.pongRunning&&G.pongScore===0){ctx.fillStyle='rgba(240,90,240,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Start !',PG_W/2,PG_H/2);ctx.textAlign='left';}}

function renderBalloon(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--pinkl)">Score: <span id="bl-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('balloon')}</span></span></div><canvas id="bl-cv" width="460" height="280" style="max-width:100%;margin:0 auto;cursor:crosshair;border:2px solid rgba(240,90,240,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px"><button class="btn btn-pink" onclick="startBalloon()">▶ Start</button><button class="btn" onclick="stopBalloon()">⏹</button></div>`;}
function stopBalloon(){clearInterval(G.balloonIv);G.balloonRunning=false;}
function initBalloon(){const cv=document.getElementById('bl-cv');if(!cv)return;cv.onclick=e=>{if(!G.balloonRunning)return;const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left)*(460/r.width),my=(e.clientY-r.top)*(280/r.height);G.balloons=G.balloons.filter(b=>{const hit=Math.hypot(mx-b.x,my-b.y)<b.r;if(hit){G.balloonScore++;G.balloonsPopped++;const el=document.getElementById('bl-s');if(el)el.textContent=G.balloonScore;addXP(1);addCoins(1);if(G.balloonsPopped>=30)unlockA('balloons_30');}return!hit;});};drawBalloon();}
function startBalloon(){stopBalloon();G.balloons=[];G.balloonScore=0;G.balloonRunning=true;let f=0;const cols=['#f05af0','#5af0e0','#f0d05a','#5af07f','#7f5af0','#f05a5a','#f0935a'];G.balloonIv=setInterval(()=>{f++;if(f%28===0)G.balloons.push({x:rng(30,430),y:290,r:rng(18,30),color:cols[rng(0,cols.length-1)],vy:rng(1,3)+G.balloonScore*0.01});G.balloons.forEach(b=>b.y-=b.vy);G.balloons=G.balloons.filter(b=>b.y>-50);drawBalloon();},30);}
function drawBalloon(){const cv=document.getElementById('bl-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#1e1e35';ctx.fillRect(0,0,460,280);G.balloons.forEach(b=>{ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(b.x,b.y+b.r);ctx.lineTo(b.x,b.y+b.r+18);ctx.stroke();ctx.shadowBlur=0;});if(!G.balloonRunning&&G.balloonScore===0){ctx.fillStyle='rgba(240,90,240,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Start puis clique les ballons !',230,140);ctx.textAlign='left';}}

/* ===== SPACE SHOOTER ===== */
const SH_W=440,SH_H=280;
function renderShoot(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--cyan)">Score: <span id="sh-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('shoot')}</span></span></div><canvas id="sh-cv" width="${SH_W}" height="${SH_H}" style="max-width:100%;margin:0 auto;border:2px solid rgba(90,240,224,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap"><button class="btn btn-cyan" style="color:#000" onclick="startShoot()">▶ Start</button><button class="btn" onclick="stopShoot()">⏹</button></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">← → pour bouger, Espace pour tirer</p>`;}
function stopShoot(){clearInterval(G.shootIv);G.shootRunning=false;}
function initShoot(){drawShoot();}
let shipX=SH_W/2,shootLeft=false,shootRight=false,shootFire=false;
function startShoot(){stopShoot();shipX=SH_W/2;G.shootBullets=[];G.shootEnemies=[];G.shootScore=0;G.shootRunning=true;let f=0;G.shootIv=setInterval(()=>{f++;if(shootLeft)shipX=clamp(shipX-5,20,SH_W-20);if(shootRight)shipX=clamp(shipX+5,20,SH_W-20);if(shootFire&&f%15===0)G.shootBullets.push({x:shipX,y:SH_H-40});if(f%40===0)G.shootEnemies.push({x:rng(20,SH_W-20),y:20,vy:1+G.shootScore*0.02});G.shootBullets.forEach(b=>b.y-=8);G.shootBullets=G.shootBullets.filter(b=>b.y>0);G.shootEnemies.forEach(e=>e.y+=e.vy);let hit=false;G.shootBullets=G.shootBullets.filter(b=>{const i=G.shootEnemies.findIndex(e=>Math.hypot(b.x-e.x,b.y-e.y)<20);if(i>=0){G.shootEnemies.splice(i,1);G.shootScore++;const el=document.getElementById('sh-s');if(el)el.textContent=G.shootScore;addXP(2);addCoins(2);return false;}return true;});if(G.shootEnemies.some(e=>e.y>SH_H-50&&Math.abs(e.x-shipX)<25)){stopShoot();if(setRecord('shoot',G.shootScore))toast('🚀 Record Shoot: '+G.shootScore+'!','cyan');toast('💥 Score: '+G.shootScore,'red');addXP(Math.floor(G.shootScore/2));return;}drawShoot();},33);}
function drawShoot(){const cv=document.getElementById('sh-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,SH_W,SH_H);if(G.shootRunning||G.shootScore>0){ctx.fillStyle='#5af0e0';ctx.shadowColor='#5af0e0';ctx.shadowBlur=10;ctx.font='24px serif';ctx.fillText('🚀',shipX-12,SH_H-30);}G.shootBullets.forEach(b=>{ctx.fillStyle='#f0d05a';ctx.shadowColor='#f0d05a';ctx.shadowBlur=8;ctx.beginPath();ctx.roundRect(b.x-3,b.y-10,6,14,3);ctx.fill();});G.shootEnemies.forEach(e=>{ctx.font='22px serif';ctx.shadowBlur=0;ctx.fillText('👾',e.x-11,e.y+8);});ctx.shadowBlur=0;if(!G.shootRunning&&G.shootScore===0){ctx.fillStyle='rgba(90,240,224,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Start !',SH_W/2,SH_H/2);ctx.textAlign='left';}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')shootLeft=true;if(e.key==='ArrowRight')shootRight=true;if(e.code==='Space'&&G.shootRunning){shootFire=true;e.preventDefault();}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')shootLeft=false;if(e.key==='ArrowRight')shootRight=false;if(e.code==='Space')shootFire=false;});

const PL_W=480,PL_H=260,PL_GRAV=0.6,PL_JUMP=-12;
function renderPlatform(){return `<div style="text-align:center;margin-bottom:10px"><span class="fredoka" style="font-size:20px;color:var(--green)">Score: <span id="pl-s">0</span></span> <span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('platform')}</span></span></div><canvas id="pl-cv" width="${PL_W}" height="${PL_H}" style="max-width:100%;margin:0 auto;border:2px solid rgba(90,240,127,.3)"></canvas><div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap"><button class="btn btn-green" style="color:#000" onclick="startPlatform()">▶ Start</button><button class="btn btn-yellow" style="color:#000" onclick="plJump()">⬆ Sauter</button></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">← → pour bouger, Espace/↑ pour sauter</p>`;}
let plLeft=false,plRight=false;
function initPlatform(){drawPlatform();}
function startPlatform(){clearInterval(G.platform.iv);G.platform={x:60,y:180,vx:0,vy:0,onGround:false,score:0,running:true,iv:null,obs:[{x:200,y:200,w:60,h:12},{x:340,y:160,w:70,h:12},{x:100,y:130,w:60,h:12}],coins:[{x:215,y:180,taken:false},{x:360,y:140,taken:false},{x:115,y:110,taken:false}]};
G.platform.iv=setInterval(()=>{const p=G.platform;if(plLeft)p.vx=-4;else if(plRight)p.vx=4;else p.vx*=0.7;p.vy+=PL_GRAV;p.x+=p.vx;p.y+=p.vy;p.x=clamp(p.x,10,PL_W-20);p.onGround=false;const ground=PL_H-30;if(p.y>=ground){p.y=ground;p.vy=0;p.onGround=true;}p.obs.forEach(ob=>{if(p.x+14>ob.x&&p.x-14<ob.x+ob.w&&p.y+14>ob.y&&p.y+14<ob.y+ob.h+p.vy+1&&p.vy>0){p.y=ob.y-14;p.vy=0;p.onGround=true;}});p.coins=p.coins.map(c=>{if(!c.taken&&Math.hypot(p.x-c.x,p.y-c.y)<20){c.taken=true;p.score++;addCoins(5);addXP(5);const el=document.getElementById('pl-s');if(el)el.textContent=p.score;}return c;});if(p.coins.every(c=>c.taken)){clearInterval(p.iv);p.running=false;unlockA('platform_finish');setRecord('platform',p.score);toast('🏃 Platformer terminé ! Score: '+p.score,'green');addXP(30);addCoins(20);}drawPlatform();},33);}
function plJump(){if(G.platform.onGround){G.platform.vy=PL_JUMP;}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')plLeft=true;if(e.key==='ArrowRight')plRight=true;if((e.key==='ArrowUp'||e.code==='Space')&&document.getElementById('pl-cv')){plJump();if(e.code==='Space')e.preventDefault();}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')plLeft=false;if(e.key==='ArrowRight')plRight=false;});
function drawPlatform(){const cv=document.getElementById('pl-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#0d1424';ctx.fillRect(0,0,PL_W,PL_H);ctx.fillStyle='rgba(90,240,127,.6)';ctx.fillRect(0,PL_H-30,PL_W,30);const p=G.platform;if(p.running||p.score>0){p.obs.forEach(ob=>{ctx.fillStyle='rgba(127,90,240,.7)';ctx.shadowColor='var(--purple)';ctx.shadowBlur=6;ctx.beginPath();ctx.roundRect(ob.x,ob.y,ob.w,ob.h,4);ctx.fill();});ctx.shadowBlur=0;p.coins.forEach(c=>{if(!c.taken){ctx.font='18px serif';ctx.fillText('🪙',c.x-9,c.y+6);}});ctx.shadowColor='#5af07f';ctx.shadowBlur=10;ctx.font='22px serif';ctx.fillText('🏃',p.x-11,p.y+8);ctx.shadowBlur=0;}if(!p.running&&p.score===0){ctx.fillStyle='rgba(90,240,127,.5)';ctx.font='13px Nunito';ctx.textAlign='center';ctx.fillText('Start ! Collecte les 🪙',PL_W/2,PL_H/2);ctx.textAlign='left';}}

/* ===== CLICKER ===== */
function renderClicker(){return `<div style="text-align:center;margin-bottom:14px"><div class="fredoka" style="font-size:40px;color:var(--purplel)" id="cl-cnt">${G.clickerCount}</div><div style="font-size:13px;color:var(--text2)">Auto: <span id="cl-auto">${G.clickerAuto}</span>/sec</div></div><div style="position:relative;display:flex;justify-content:center;margin-bottom:16px" id="cl-wrap"><button class="clicker-big" onclick="doClick(event)">🚀</button></div><div class="card"><div class="card-title">🛒 Améliorations</div>${[[50,1,'🤖','Robot cliqueur','1/sec'],[200,5,'⚡','Turbo robot','5/sec'],[500,20,'🌌','Moteur galactique','20/sec']].map((u,i)=>`<div class="row"><span style="font-size:22px">${u[2]}</span><div style="flex:1"><div style="font-weight:800;font-size:13px">${u[3]}</div><div style="font-size:12px;color:var(--text2)">${u[4]}</div></div><button class="btn btn-yellow btn-sm" style="color:#000" onclick="buyUpgrade(${u[0]},${u[1]})">${u[0]} 🪙</button></div>`).join('')}</div>`;}
function initClicker(){stopAll();if(G.clickerAuto>0){G.clickerIv=setInterval(()=>{G.clickerCount+=G.clickerAuto;addCoins(G.clickerAuto);const el=document.getElementById('cl-cnt');if(el)el.textContent=G.clickerCount;},1000);}}

function buyUpgrade(cost,auto){if(G.coins>=cost){G.coins-=cost;G.clickerAuto+=auto;updateTop();toast('✅ Auto: '+G.clickerAuto+'/sec','purple');initClicker();}else toast('Pas assez de pièces !','red');}

/* ===== MEMORY ===== */
const MEM_EM=['🐍','🚀','🎮','⭐','🎨','💎','🔥','🦄'];
function renderMemory(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--pinkl)">Coups: <span id="mm-mv">${G.memMoves}</span></span><span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('memory')?getRecord('memory')+' coups':'—'}</span></span><button class="btn btn-pink" onclick="startMemory()">🔄 Nouveau</button></div><div id="mm-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;width:100%"></div>`;}
function initMemory(){startMemory();}
function startMemory(){const pairs=[...MEM_EM,...MEM_EM].sort(()=>Math.random()-.5);G.memCards=pairs.map((em,i)=>({id:i,emoji:em,flipped:false,matched:false}));G.memFlipped=[];G.memMatched=0;G.memMoves=0;G.memLocked=false;renderMemGrid();const el=document.getElementById('mm-mv');if(el)el.textContent=0;}
function renderMemGrid(){const g=document.getElementById('mm-grid');if(!g)return;g.innerHTML=G.memCards.map((c,i)=>`<div class="mem-card ${c.flipped||c.matched?'flipped':''} ${c.matched?'matched':''}" onclick="flipMem(${i})" style="min-height:74px"><span>${c.emoji}</span></div>`).join('');}
function flipMem(i){if(G.memLocked||G.memCards[i].flipped||G.memCards[i].matched)return;G.memCards[i].flipped=true;G.memFlipped.push(i);renderMemGrid();if(G.memFlipped.length===2){G.memLocked=true;G.memMoves++;const el=document.getElementById('mm-mv');if(el)el.textContent=G.memMoves;const[a,b]=G.memFlipped;if(G.memCards[a].emoji===G.memCards[b].emoji){G.memCards[a].matched=G.memCards[b].matched=true;G.memMatched+=2;G.memFlipped=[];G.memLocked=false;addXP(5);addCoins(3);renderMemGrid();if(G.memMatched===G.memCards.length){setRecord('memory',G.memMoves);unlockA('memory_win');toast('🎉 Memory gagné en '+G.memMoves+' coups !','pink');addXP(20);addCoins(20);}}else{setTimeout(()=>{G.memCards[a].flipped=G.memCards[b].flipped=false;G.memFlipped=[];G.memLocked=false;renderMemGrid();},850);}}}

/* ===== TIC TAC TOE ===== */
function renderTTT(){return `<div style="display:flex;gap:14px;align-items:center;margin-bottom:12px;flex-wrap:wrap"><span class="fredoka" style="font-size:18px;color:var(--cyan)">Tour: <span id="ttt-t" style="color:${G.tttTurn==='X'?'var(--purple)':'var(--orange)'}">${G.tttTurn}</span></span><label style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="ttt-ai" ${G.tttVsAI?'checked':''} onchange="G.tttVsAI=this.checked" style="width:auto"> vs IA</label><button class="btn btn-cyan" style="color:#000" onclick="initTTT()">🔄</button></div><div id="ttt-board" style="display:grid;grid-template-columns:repeat(3,76px);gap:8px;width:fit-content;margin:0 auto"></div><div id="ttt-msg" class="fredoka" style="font-size:22px;text-align:center;margin-top:12px;min-height:30px"></div>`;}
function initTTT(){G.tttBoard=Array(9).fill('');G.tttTurn='X';renderTTTBoard();}
function renderTTTBoard(){const b=document.getElementById('ttt-board');if(!b)return;const t=document.getElementById('ttt-t');if(t){t.textContent=G.tttTurn;t.style.color=G.tttTurn==='X'?'var(--purple)':'var(--orange)';}const w=checkTTT();const wc=w?w.cells:[];b.innerHTML=G.tttBoard.map((v,i)=>`<div class="ttt-cell ${v?'used':''} ${wc.includes(i)?'win-cell':''}" onclick="clickTTT(${i})" style="color:${v==='X'?'var(--purple)':'var(--orange)'}">${v}</div>`).join('');}
function clickTTT(i){if(G.tttBoard[i]||checkTTT())return;G.tttBoard[i]=G.tttTurn;const w=checkTTT();const msg=document.getElementById('ttt-msg');if(w){if(msg){msg.textContent='🎉 '+w.winner+' gagne !';msg.style.color=w.winner==='X'?'var(--purple)':'var(--orange)';}renderTTTBoard();if(w.winner==='X'){unlockA('ttt_win');addXP(15);addCoins(10);}return;}if(!G.tttBoard.includes('')){if(msg){msg.textContent='🤝 Égalité !';msg.style.color='var(--yellow)';}renderTTTBoard();return;}G.tttTurn=G.tttTurn==='X'?'O':'X';renderTTTBoard();if(G.tttVsAI&&G.tttTurn==='O')setTimeout(aiTTT,400);}
function aiTTT(){const empty=G.tttBoard.map((v,i)=>v?null:i).filter(x=>x!==null);if(!empty.length||checkTTT())return;for(const mark of['O','X']){for(const idx of empty){const t=[...G.tttBoard];t[idx]=mark;if(checkTTTArr(t)){G.tttBoard[idx]='O';G.tttTurn='X';renderTTTBoard();return;}}}G.tttBoard[empty[rng(0,empty.length-1)]]='O';G.tttTurn='X';renderTTTBoard();}
function checkTTT(){return checkTTTArr(G.tttBoard);}
function checkTTTArr(b){const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(const[a,c,d]of lines){if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],cells:[a,c,d]};}return null;}

/* ===== CONNECT FOUR ===== */
function renderC4(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:17px;color:var(--yellow)">Tour: <span id="c4-t" style="color:${G.c4Turn===1?'var(--red)':'var(--yellow)'}">${G.c4Turn===1?'🔴':'🟡'}</span></span><button class="btn btn-yellow" style="color:#000" onclick="initC4()">🔄</button></div><div id="c4-board" style="display:inline-grid;grid-template-columns:repeat(7,44px);gap:5px;background:rgba(127,90,240,.18);padding:10px;border-radius:var(--rad-lg)"></div><div id="c4-msg" class="fredoka" style="font-size:20px;text-align:center;margin-top:12px;min-height:28px"></div>`;}
function initC4(){G.connectFour=Array(42).fill(0);G.c4Turn=1;G.c4Over=false;renderC4Board();}
function renderC4Board(){const b=document.getElementById('c4-board');if(!b)return;const t=document.getElementById('c4-t');if(t){t.textContent=G.c4Turn===1?'🔴':'🟡';t.style.color=G.c4Turn===1?'var(--red)':'var(--yellow)';}b.innerHTML=Array.from({length:7},(_,c)=>`<div style="display:flex;flex-direction:column;gap:5px;cursor:pointer" onclick="dropC4(${c})">${Array.from({length:6},(_2,r)=>{const v=G.connectFour[r*7+c];return `<div style="width:44px;height:44px;border-radius:50%;background:${v===1?'var(--red)':v===2?'var(--yellow)':'var(--bg3)'};border:2px solid rgba(127,90,240,.2);transition:background .2s"></div>`;}).join('')}</div>`).join('');}
function dropC4(col){if(G.c4Over)return;for(let r=5;r>=0;r--){const idx=r*7+col;if(!G.connectFour[idx]){G.connectFour[idx]=G.c4Turn;break;}}if(checkC4(G.c4Turn)){const el=document.getElementById('c4-msg');if(el){el.textContent=(G.c4Turn===1?'🔴 Rouge':'🟡 Jaune')+' gagne !';el.style.color=G.c4Turn===1?'var(--red)':'var(--yellow)';}G.c4Over=true;addXP(20);addCoins(15);renderC4Board();return;}G.c4Turn=G.c4Turn===1?2:1;renderC4Board();if(G.c4Turn===2)setTimeout(aiC4,300);}
function aiC4(){const empty=[];for(let c=0;c<7;c++){for(let r=5;r>=0;r--){if(!G.connectFour[r*7+c]){empty.push({r,c});break;}}}if(!empty.length)return;for(const mark of[2,1]){for(const{r,c}of empty){const t=[...G.connectFour];t[r*7+c]=mark;if(checkC4Arr(t,mark)){G.connectFour[r*7+c]=2;G.c4Turn=1;renderC4Board();return;}}}const p=empty[rng(0,empty.length-1)];G.connectFour[p.r*7+p.c]=2;G.c4Turn=1;renderC4Board();}
function checkC4(p){return checkC4Arr(G.connectFour,p);}
function checkC4Arr(b,p){const R=6,C=7;for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(c+3<C&&[0,1,2,3].every(i=>b[r*C+c+i]===p))return true;if(r+3<R&&[0,1,2,3].every(i=>b[(r+i)*C+c]===p))return true;if(r+3<R&&c+3<C&&[0,1,2,3].every(i=>b[(r+i)*C+c+i]===p))return true;if(r+3<R&&c-3>=0&&[0,1,2,3].every(i=>b[(r+i)*C+c-i]===p))return true;}return false;}

const T48C={'':['#252540','var(--text3)'],2:['rgba(90,240,127,.15)','var(--green)'],4:['rgba(90,240,224,.15)','var(--cyan)'],8:['rgba(127,90,240,.2)','var(--purplel)'],16:['rgba(240,90,240,.2)','var(--pinkl)'],32:['rgba(240,208,90,.2)','var(--yellow)'],64:['rgba(240,90,90,.2)','var(--redl)'],128:['rgba(90,240,127,.3)','var(--green)'],256:['rgba(90,240,224,.3)','var(--cyan)'],512:['rgba(127,90,240,.35)','var(--purplel)'],1024:['rgba(240,90,240,.35)','var(--pinkl)'],2048:['rgba(240,208,90,.4)','var(--yellow)']};
function render2048(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:20px;color:var(--yellow)">Score: <span id="t48-s">${G.t48score}</span></span><span style="font-size:13px;color:var(--text2)">Rec: <span style="color:var(--yellow)">${getRecord('2048')}</span></span><button class="btn btn-yellow" style="color:#000" onclick="init2048()">🔄</button></div><div class="t48-grid" id="t48-grid"></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:10px">← ↑ → ↓ ou swipe</p>`;}
function init2048(){G.t48board=Array(16).fill(0);G.t48score=0;addT48Tile();addT48Tile();renderT48();}
function addT48Tile(){const empty=G.t48board.map((v,i)=>v?null:i).filter(x=>x!==null);if(empty.length)G.t48board[empty[rng(0,empty.length-1)]]=Math.random()<.9?2:4;}
function renderT48(){const g=document.getElementById('t48-grid');if(!g)return;const s=document.getElementById('t48-s');if(s)s.textContent=G.t48score;g.innerHTML=G.t48board.map(v=>{const[bg,color]=T48C[v]||['rgba(127,90,240,.4)','#fff'];return `<div class="t48-cell" style="background:${bg};color:${color}">${v||''}</div>`;}).join('');}
function move2048(dir){let moved=false;const slide=row=>{let r=row.filter(x=>x);for(let i=0;i<r.length-1;i++){if(r[i]===r[i+1]){r[i]*=2;G.t48score+=r[i];r.splice(i+1,1);moved=true;}}while(r.length<4)r.push(0);return r;};let b=[...G.t48board];if(dir==='left'){for(let r=0;r<4;r++){const row=b.slice(r*4,r*4+4);const nr=slide(row);if(nr.join()!==row.join())moved=true;for(let c=0;c<4;c++)b[r*4+c]=nr[c];}}else if(dir==='right'){for(let r=0;r<4;r++){const row=b.slice(r*4,r*4+4).reverse();const nr=slide(row).reverse();if(nr.join()!==b.slice(r*4,r*4+4).join())moved=true;for(let c=0;c<4;c++)b[r*4+c]=nr[c];}}else if(dir==='up'){for(let c=0;c<4;c++){const col=[b[c],b[4+c],b[8+c],b[12+c]];const nc=slide(col);if(nc.join()!==col.join())moved=true;for(let r=0;r<4;r++)b[r*4+c]=nc[r];}}else if(dir==='down'){for(let c=0;c<4;c++){const col=[b[c],b[4+c],b[8+c],b[12+c]].reverse();const nc=slide(col).reverse();if(nc.join()!==col.join())moved=true;for(let r=0;r<4;r++)b[r*4+c]=nc[r];}}if(moved){G.t48board=b;addT48Tile();setRecord('2048',G.t48score);renderT48();}}
document.addEventListener('keydown',e=>{if(!document.getElementById('t48-grid'))return;const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(m[e.key]){e.preventDefault();move2048(m[e.key]);}});

function renderPuzzleBoard(){const b=document.getElementById('pz-board');if(!b)return;const sz=G.puzzleSize;const mv=document.getElementById('pz-mv');if(mv)mv.textContent=G.puzzleMoves;const empty=G.puzzleBoard.indexOf(0);b.innerHTML=G.puzzleBoard.map((v,i)=>{const dr=Math.abs(Math.floor(i/sz)-Math.floor(empty/sz));const dc=Math.abs(i%sz-empty%sz);const adj=(dr===1&&dc===0)||(dr===0&&dc===1);return v===0?`<div style="height:62px;border-radius:var(--rad);background:var(--bg4)"></div>`:`<div style="height:62px;border-radius:var(--rad);background:${adj?'rgba(127,90,240,.2)':'var(--bg3)'};border:1px solid rgba(127,90,240,.3);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:22px;color:var(--purplel);cursor:${adj?'pointer':'default'}" onclick="movePuzzle(${i})">${v}</div>`;}).join('');}
function movePuzzle(i){const empty=G.puzzleBoard.indexOf(0);const sz=G.puzzleSize;const dr=Math.abs(Math.floor(i/sz)-Math.floor(empty/sz));const dc=Math.abs(i%sz-empty%sz);if((dr===1&&dc===0)||(dr===0&&dc===1)){[G.puzzleBoard[i],G.puzzleBoard[empty]]=[G.puzzleBoard[empty],G.puzzleBoard[i]];G.puzzleMoves++;renderPuzzleBoard();if(G.puzzleBoard.every((v,idx)=>v===idx)){toast('🧩 Puzzle résolu en '+G.puzzleMoves+' mouvements !','cyan');addXP(20);addCoins(15);setRecord('puzzle',G.puzzleMoves);}}}

const MZ=15;function renderMaze(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--green)">Labyrinthe</span><button class="btn btn-green" style="color:#000" onclick="initMaze()">🔄 Nouveau</button></div><canvas id="mz-cv" width="${MZ*G.mazePx}" height="${MZ*G.mazePx}" style="border:2px solid rgba(90,240,127,.3);margin:0 auto;display:block"></canvas><div id="mz-msg" style="text-align:center;font-size:14px;font-weight:800;color:var(--green);margin-top:10px;min-height:20px"></div><p style="text-align:center;font-size:12px;color:var(--text3);margin-top:7px">← ↑ → ↓ pour déplacer le joueur 🟢</p>`;}
function initMaze(){
  G.mazeGrid=[];for(let i=0;i<MZ*MZ;i++)G.mazeGrid.push({visited:false,walls:[true,true,true,true]});
  const stack=[0];G.mazeGrid[0].visited=true;let cur=0;
  while(stack.length){const neighbors=[];const r=Math.floor(cur/MZ),c=cur%MZ;if(r>0&&!G.mazeGrid[cur-MZ].visited)neighbors.push({i:cur-MZ,wall:0,opp:2});if(c<MZ-1&&!G.mazeGrid[cur+1].visited)neighbors.push({i:cur+1,wall:1,opp:3});if(r<MZ-1&&!G.mazeGrid[cur+MZ].visited)neighbors.push({i:cur+MZ,wall:2,opp:0});if(c>0&&!G.mazeGrid[cur-1].visited)neighbors.push({i:cur-1,wall:3,opp:1});if(neighbors.length){const n=neighbors[rng(0,neighbors.length-1)];G.mazeGrid[cur].walls[n.wall]=false;G.mazeGrid[n.i].walls[n.opp]=false;G.mazeGrid[n.i].visited=true;stack.push(cur=n.i);}else cur=stack.pop();}
  G.mazePlayer={x:0,y:0};drawMaze();
}
function drawMaze(){const cv=document.getElementById('mz-cv');if(!cv)return;const ctx=cv.getContext('2d');const px=G.mazePx;ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,MZ*px,MZ*px);ctx.strokeStyle='rgba(90,240,127,.7)';ctx.lineWidth=1.5;for(let r=0;r<MZ;r++){for(let c=0;c<MZ;c++){const cell=G.mazeGrid[r*MZ+c];const x=c*px,y=r*px;if(cell.walls[0]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+px,y);ctx.stroke();}if(cell.walls[1]){ctx.beginPath();ctx.moveTo(x+px,y);ctx.lineTo(x+px,y+px);ctx.stroke();}if(cell.walls[2]){ctx.beginPath();ctx.moveTo(x,y+px);ctx.lineTo(x+px,y+px);ctx.stroke();}if(cell.walls[3]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+px);ctx.stroke();}}}
  ctx.fillStyle='#f0d05a';ctx.shadowColor='#f0d05a';ctx.shadowBlur=8;ctx.beginPath();ctx.arc((MZ-1)*px+px/2,(MZ-1)*px+px/2,px/3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5af07f';ctx.shadowColor='#5af07f';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(G.mazePlayer.x*px+px/2,G.mazePlayer.y*px+px/2,px/3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
document.addEventListener('keydown',e=>{if(!document.getElementById('mz-cv'))return;const p=G.mazePlayer;const cell=G.mazeGrid[p.y*MZ+p.x];let moved=false;if(e.key==='ArrowUp'&&!cell.walls[0]){p.y--;moved=true;}else if(e.key==='ArrowRight'&&!cell.walls[1]){p.x++;moved=true;}else if(e.key==='ArrowDown'&&!cell.walls[2]){p.y++;moved=true;}else if(e.key==='ArrowLeft'&&!cell.walls[3]){p.x--;moved=true;}if(moved){e.preventDefault();drawMaze();if(p.x===MZ-1&&p.y===MZ-1){const msg=document.getElementById('mz-msg');if(msg)msg.textContent='🎉 Sortie trouvée !';toast('🗺️ Labyrinthe résolu !','green');addXP(20);addCoins(15);}}});

function renderPaint(){return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap"><div style="display:flex;gap:5px" id="pt-colors">${['#f05a5a','#f0935a','#f0d05a','#5af07f','#5af0e0','#7f5af0','#f05af0','#fff','#aaa','#333','#000'].map((c,i)=>`<div class="cdot ${i===5?'active':''}" style="background:${c}" data-c="${c}" onclick="setPtColor('${c}',this)"></div>`).join('')}</div><button class="btn btn-sm btn-red" onclick="clearPaint()">🗑️</button><button class="btn btn-sm btn-purple" onclick="savePaint()">💾</button></div><canvas id="pt-cv" width="${PT_SIZE*24}" height="${PT_SIZE*16}" style="max-width:100%;cursor:crosshair;border:2px solid rgba(127,90,240,.3);image-rendering:pixelated"></canvas>`;}
let ptColor='#7f5af0',ptDrawing=false;
function initPaint(){const cv=document.getElementById('pt-cv');if(!cv)return;const ctx=cv.getContext('2d');const W=PT_SIZE*24,H=PT_SIZE*16;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);function getCell(e){const r=cv.getBoundingClientRect();const src=e.touches?e.touches[0]:e;const x=Math.floor((src.clientX-r.left)*(W/r.width)/PT_SIZE);const y=Math.floor((src.clientY-r.top)*(H/r.height)/PT_SIZE);return{x,y};}function paint(e){const{x,y}=getCell(e);if(x<0||x>=24||y<0||y>=16)return;ctx.fillStyle=ptColor;ctx.fillRect(x*PT_SIZE,y*PT_SIZE,PT_SIZE,PT_SIZE);ctx.strokeStyle='rgba(127,90,240,.1)';ctx.lineWidth=.5;ctx.strokeRect(x*PT_SIZE,y*PT_SIZE,PT_SIZE,PT_SIZE);}cv.addEventListener('mousedown',e=>{ptDrawing=true;paint(e);});cv.addEventListener('mousemove',e=>{if(ptDrawing)paint(e);});cv.addEventListener('mouseup',()=>ptDrawing=false);cv.addEventListener('mouseleave',()=>ptDrawing=false);cv.addEventListener('touchstart',e=>{e.preventDefault();ptDrawing=true;paint(e);},{passive:false});cv.addEventListener('touchmove',e=>{e.preventDefault();if(ptDrawing)paint(e);},{passive:false});cv.addEventListener('touchend',()=>ptDrawing=false);// Grid
ctx.strokeStyle='rgba(127,90,240,.08)';ctx.lineWidth=.5;for(let x=0;x<=24;x++){ctx.beginPath();ctx.moveTo(x*PT_SIZE,0);ctx.lineTo(x*PT_SIZE,H);ctx.stroke();}for(let y=0;y<=16;y++){ctx.beginPath();ctx.moveTo(0,y*PT_SIZE);ctx.lineTo(W,y*PT_SIZE);ctx.stroke();}window._dcClean=()=>{ptDrawing=false;};}
function setPtColor(c,el){ptColor=c;document.querySelectorAll('#pt-colors .cdot').forEach(d=>d.classList.remove('active'));el.classList.add('active');}
function clearPaint(){const cv=document.getElementById('pt-cv');if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);}

function renderQuiz(){if(G.quizIdx>=QUIZ.length)return `<div class="card" style="text-align:center;padding:24px"><div style="font-size:52px">🎉</div><div class="fredoka" style="font-size:24px;color:var(--purplel);margin:10px 0">Quiz terminé !</div><div style="font-size:15px;color:var(--text2)">Score: ${G.quizScore}/${QUIZ.length}</div><div style="margin-top:14px"><button class="btn btn-purple" onclick="G.quizIdx=0;G.quizScore=0;G.quizAnswered=false;go('quiz')">🔄 Rejouer</button></div></div>`;const q=QUIZ[G.quizIdx];return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px"><span class="badge badge-purple">${q.cat}</span><span style="font-size:13px;color:var(--text2)">${G.quizIdx+1}/${QUIZ.length}</span><span class="fredoka" style="font-size:17px;color:var(--yellow)">🪙 ${G.quizScore*10}</span></div><div class="prog" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct(G.quizIdx,QUIZ.length)}%;background:linear-gradient(90deg,var(--purple),var(--pink))"></div></div><div style="font-size:15px;font-weight:800;margin-bottom:14px;line-height:1.5">${q.q}</div>${q.opts.map((o,i)=>`<button class="qopt" id="qo-${i}" onclick="answerQuiz(${i})">${o}</button>`).join('')}<div id="qz-fb" style="display:none;padding:10px;border-radius:var(--rad);text-align:center;font-weight:800;font-size:14px;margin-top:6px"></div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-purple" id="qz-next" onclick="G.quizIdx++;G.quizAnswered=false;go('quiz')" disabled>Suivant →</button></div></div>`;}
function answerQuiz(i){if(G.quizAnswered)return;G.quizAnswered=true;const q=QUIZ[G.quizIdx];document.querySelectorAll('.qopt').forEach((b,j)=>{b.disabled=true;if(j===q.a)b.classList.add('correct');else if(j===i&&i!==q.a)b.classList.add('wrong');});const fb=document.getElementById('qz-fb');fb.style.display='block';if(i===q.a){G.quizScore++;fb.style.background='rgba(90,240,127,.15)';fb.style.color='var(--green)';fb.textContent='✅ Correct ! +10 🪙';addCoins(10);addXP(8);if(G.quizScore>=5)unlockA('quiz_5');}else{fb.style.background='rgba(240,90,90,.15)';fb.style.color='var(--redl)';fb.textContent='❌ Réponse: '+q.opts[q.a];}document.getElementById('qz-next').disabled=false;}

/* ===== MATHS ===== */
function renderMaths(){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--cyanl)">Score: <span id="mt-s">${G.mathScore}</span></span><span class="badge badge-yellow">🔥 Streak: <span id="mt-st">${G.mathStreak}</span></span><span style="font-size:14px;font-weight:800;color:var(--pink)">⏱ <span id="mt-t">10</span>s</span></div><div class="fredoka" style="font-size:42px;text-align:center;color:var(--cyan);margin:10px 0" id="mt-q">?</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="mt-opts"></div><div id="mt-fb" style="text-align:center;margin-top:10px;font-size:14px;font-weight:800;min-height:22px"></div><div style="text-align:center;margin-top:12px"><button class="btn btn-cyan" style="color:#000" onclick="newMathQ()">▶ Commencer</button></div>`;}
function newMathQ(){if(window._mathIv)clearInterval(window._mathIv);const ops=['+','-','×'];const op=ops[rng(0,2)];let a,b,ans;if(op==='+'){a=rng(1,50);b=rng(1,50);ans=a+b;}else if(op==='-'){a=rng(10,50);b=rng(1,a);ans=a-b;}else{a=rng(2,12);b=rng(2,12);ans=a*b;}const ws=new Set();while(ws.size<3){const w=ans+rng(-12,12);if(w!==ans&&w>0)ws.add(w);}const opts=[...ws,ans].sort(()=>Math.random()-.5);const qEl=document.getElementById('mt-q');const opEl=document.getElementById('mt-opts');const fb=document.getElementById('mt-fb');const tiEl=document.getElementById('mt-t');if(!qEl)return;qEl.textContent=`${a} ${op} ${b} = ?`;fb.textContent='';let answered=false;opEl.innerHTML=opts.map((o,i)=>`<div style="padding:14px;border-radius:var(--rad);border:1px solid rgba(90,240,224,.25);background:var(--bg3);font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;text-align:center;transition:all .2s" id="mo-${i}" onclick="answerMath(${o},${ans},${i})">${o}</div>`).join('');let t=10;if(tiEl)tiEl.textContent=t;window._mathIv=setInterval(()=>{t--;if(tiEl)tiEl.textContent=t;if(t<=0){clearInterval(window._mathIv);if(!answered){fb.textContent='⏰ Temps ! Réponse: '+ans;fb.style.color='var(--redl)';G.mathStreak=0;const st=document.getElementById('mt-st');if(st)st.textContent=0;answered=true;}setTimeout(newMathQ,1500);}},1000);opEl._ans=()=>answered;opEl._set=()=>{answered=true;clearInterval(window._mathIv);};}
function answerMath(val,ans,idx){const op=document.getElementById('mt-opts');if(!op||!op._ans||op._ans())return;op._set();const fb=document.getElementById('mt-fb');const btn=document.getElementById('mo-'+idx);if(val===ans){if(btn){btn.style.background='rgba(90,240,127,.2)';btn.style.borderColor='var(--green)';btn.style.color='var(--green)';}G.mathScore++;G.mathStreak++;fb.textContent=`✅ Correct ! +5 🪙 🔥${G.mathStreak}`;fb.style.color='var(--green)';addCoins(5);addXP(5);const s=document.getElementById('mt-s');if(s)s.textContent=G.mathScore;const st=document.getElementById('mt-st');if(st)st.textContent=G.mathStreak;if(G.mathScore>=10)unlockA('math_10');}else{if(btn){btn.style.background='rgba(240,90,90,.15)';btn.style.borderColor='var(--red)';btn.style.color='var(--redl)';}G.mathStreak=0;fb.textContent=`❌ Réponse: ${ans}`;fb.style.color='var(--redl)';const st=document.getElementById('mt-st');if(st)st.textContent=0;}setTimeout(newMathQ,1500);}

/* ===== PENDU ===== */
const PM=['DRAGON','GALAXY','FUSEE','NINJA','TRESOR','MAGIE','CRISTAL','OCEAN','ROBOT','LICORNE','METEORE','COSMOS','VOLCAN','SPHINX','ZEPHYR','PIXEL'];
function renderPendu(){return `<div class="grid-2" style="gap:14px"><div><svg width="150" height="150" viewBox="0 0 160 160" style="display:block;margin:0 auto"><line x1="20" y1="150" x2="140" y2="150" stroke="var(--purple)" stroke-width="3" stroke-linecap="round"/><line x1="60" y1="150" x2="60" y2="10" stroke="var(--purple)" stroke-width="3" stroke-linecap="round"/><line x1="60" y1="10" x2="110" y2="10" stroke="var(--purple)" stroke-width="3" stroke-linecap="round"/><line x1="110" y1="10" x2="110" y2="28" stroke="var(--purple)" stroke-width="3" stroke-linecap="round"/>${G.penduErrors>=1?'<circle cx="110" cy="43" r="14" stroke="var(--red)" stroke-width="2.5" fill="none"/>':''}${G.penduErrors>=2?'<line x1="110" y1="57" x2="110" y2="93" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/>':''}${G.penduErrors>=3?'<line x1="110" y1="68" x2="89" y2="88" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/>':''}${G.penduErrors>=4?'<line x1="110" y1="68" x2="131" y2="88" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/>':''}${G.penduErrors>=5?'<line x1="110" y1="93" x2="91" y2="116" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/>':''}${G.penduErrors>=6?'<line x1="110" y1="93" x2="129" y2="116" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"/>':''}</svg><div style="text-align:center;font-size:13px;color:var(--text2)">Erreurs: <strong style="color:${G.penduErrors>=4?'var(--red)':'var(--text)'}">${G.penduErrors}/6</strong></div></div><div><div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0" id="pd-word"></div><div id="pd-st" class="fredoka" style="font-size:18px;min-height:26px;margin:7px 0"></div><div class="kb" id="pd-kb"></div><div style="margin-top:10px"><button class="btn btn-purple btn-sm" onclick="initPendu()">🔄 Nouveau</button></div></div></div>`;}
function initPendu(){G.penduWord=PM[rng(0,PM.length-1)];G.penduGuessed=[];G.penduErrors=0;renderPenduBoard();}
function renderPenduBoard(){const wEl=document.getElementById('pd-word');const kEl=document.getElementById('pd-kb');const sEl=document.getElementById('pd-st');if(!wEl)return;const won=G.penduWord.split('').every(l=>G.penduGuessed.includes(l));const lost=G.penduErrors>=6;wEl.innerHTML=G.penduWord.split('').map(l=>`<div class="letter-box ${G.penduGuessed.includes(l)?'hit':''}">${G.penduGuessed.includes(l)?l:''}</div>`).join('');if(won){sEl.innerHTML='<span style="color:var(--green)">🎉 Bravo !</span>';unlockA('pendu_win');addXP(25);addCoins(15);}else if(lost){sEl.innerHTML=`<span style="color:var(--red)">💀 ${G.penduWord}</span>`;}else sEl.textContent='';kEl.innerHTML='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>{const used=G.penduGuessed.includes(l);const hit=used&&G.penduWord.includes(l);const miss=used&&!G.penduWord.includes(l);return `<button class="key ${hit?'k-hit':''} ${miss?'k-miss':''}" ${(used||won||lost)?'disabled':''} onclick="guessL('${l}')">${l}</button>`;}).join('');}
function guessL(l){if(!G.penduWord||G.penduGuessed.includes(l))return;G.penduGuessed.push(l);if(!G.penduWord.includes(l))G.penduErrors++;go('pendu');}

/* ===== WORDLE ===== */
const WW=['ROBOT','MAGIE','OCEAN','PIXEL','LASER','NORME','BULLE','CARTE','DANSE','FLUTE','GLOBE','JOUER','KOALA','LIANE','MORNE'];
function renderWordle(){if(!G.wordleWord)initWordleData();return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><span class="fredoka" style="font-size:18px;color:var(--purplel)">Wordle</span><span style="font-size:13px;color:var(--text2)">6 essais max</span><button class="btn btn-purple btn-sm" onclick="initWordle()">🔄</button></div><div id="wl-board" style="margin-bottom:12px"></div><div class="kb" id="wl-kb"></div><div id="wl-msg" class="fredoka" style="font-size:16px;text-align:center;margin-top:10px;min-height:22px"></div>`;}
function initWordleData(){G.wordleWord=WW[rng(0,WW.length-1)];G.wordleGuesses=[];G.wordleCurrent='';G.wordleOver=false;}
function initWordle(){initWordleData();go('wordle');}
function renderWordleBoard(){const b=document.getElementById('wl-board');if(!b)return;b.innerHTML=Array.from({length:6},(_,r)=>{const guess=G.wordleGuesses[r];const cells=Array.from({length:5},(_2,c)=>{let cls='',ch='';if(guess){ch=guess[c]||'';if(ch===G.wordleWord[c])cls='hit';else if(G.wordleWord.includes(ch))cls='partial';else cls='miss';}else if(r===G.wordleGuesses.length)ch=G.wordleCurrent[c]||'';return `<div class="w-cell ${cls}">${ch}</div>`;}).join('');return `<div style="display:flex;gap:5px;justify-content:center;margin-bottom:5px">${cells}</div>`;}).join('');const kEl=document.getElementById('wl-kb');if(!kEl)return;const ls={};G.wordleGuesses.forEach(g=>g.split('').forEach((ch,i)=>{if(ch===G.wordleWord[i])ls[ch]='hit';else if(G.wordleWord.includes(ch)&&ls[ch]!=='hit')ls[ch]='partial';else if(!ls[ch])ls[ch]='miss';}));kEl.innerHTML='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>`<button class="key ${ls[l]?'k-'+ls[l]:''}" onclick="wKey('${l}')" ${G.wordleOver?'disabled':''}>${l}</button>`).join('')+`<button class="key" onclick="wKey('ENTER')" ${G.wordleOver?'disabled':''}>↵</button><button class="key" onclick="wKey('DEL')" ${G.wordleOver?'disabled':''}>⌫</button>`;}
function wKey(k){if(G.wordleOver)return;if(k==='DEL')G.wordleCurrent=G.wordleCurrent.slice(0,-1);else if(k==='ENTER'){if(G.wordleCurrent.length!==5){toast('5 lettres !','red');return;}G.wordleGuesses.push(G.wordleCurrent);if(G.wordleCurrent===G.wordleWord){G.wordleOver=true;const el=document.getElementById('wl-msg');if(el){el.textContent='🎉 Bravo !';el.style.color='var(--green)';}unlockA('wordle_win');addXP(30);addCoins(25);}else if(G.wordleGuesses.length>=6){G.wordleOver=true;const el=document.getElementById('wl-msg');if(el){el.textContent='💀 '+G.wordleWord;el.style.color='var(--red)';}}G.wordleCurrent='';}else if(G.wordleCurrent.length<5&&k.match(/[A-Z]/))G.wordleCurrent+=k;renderWordleBoard();}
document.addEventListener('keydown',e=>{if(!document.getElementById('wl-board'))return;const k=e.key.toUpperCase();if(k==='ENTER')wKey('ENTER');else if(k==='BACKSPACE')wKey('DEL');else if(k.length===1&&k.match(/[A-Z]/))wKey(k);});

/* ===== ANAGRAMME ===== */
const AG_DATA=[['DRAGON'],['FUSEE'],['MAGIE'],['OCEAN'],['ROBOT'],['NINJA'],['LASER'],['BULLE'],['PIANO'],['FLEUR']];
function renderAnagram(){return `<div class="card"><div class="card-title">🔀 Anagramme</div><div class="fredoka" style="font-size:34px;text-align:center;color:var(--purplel);letter-spacing:6px;margin:14px 0" id="ag-w"></div><input id="ag-inp" placeholder="Ta réponse..." onkeydown="if(event.key==='Enter')checkAg()" style="margin-bottom:10px;text-transform:uppercase"><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn btn-purple" onclick="checkAg()">✓ Vérifier</button><button class="btn" onclick="initAnagram()">🔀 Nouveau</button></div><div id="ag-msg" style="text-align:center;margin-top:10px;font-size:14px;font-weight:800;min-height:22px"></div><div style="text-align:center;font-size:13px;color:var(--text2);margin-top:6px">Score: <span id="ag-s" style="color:var(--purplel)">${getRecord('anagram')}</span></div></div>`;}
function initAnagram(){const[w]=AG_DATA[rng(0,AG_DATA.length-1)];G.anagramAnswer=w;G.anagram=w.split('').sort(()=>Math.random()-.5).join('');while(G.anagram===w&&w.length>2)G.anagram=w.split('').sort(()=>Math.random()-.5).join('');const el=document.getElementById('ag-w');if(el)el.textContent=G.anagram;const inp=document.getElementById('ag-inp');if(inp)inp.value='';const msg=document.getElementById('ag-msg');if(msg)msg.textContent='';}
function checkAg(){const inp=document.getElementById('ag-inp');const msg=document.getElementById('ag-msg');if(!inp||!msg)return;const v=inp.value.toUpperCase().trim();if(v===G.anagramAnswer){msg.textContent='🎉 Correct ! +10 🪙';msg.style.color='var(--green)';addCoins(10);addXP(8);setRecord('anagram',getRecord('anagram')+1);const s=document.getElementById('ag-s');if(s)s.textContent=getRecord('anagram');setTimeout(initAnagram,1500);}else{msg.textContent='❌ Essaie encore !';msg.style.color='var(--redl)';}}
/* ===== DRAPEAUX ===== */
const FLAGS=[{n:'France',f:'🇫🇷'},{n:'Japon',f:'🇯🇵'},{n:'USA',f:'🇺🇸'},{n:'Brésil',f:'🇧🇷'},{n:'Allemagne',f:'🇩🇪'},{n:'Italie',f:'🇮🇹'},{n:'Canada',f:'🇨🇦'},{n:'Espagne',f:'🇪🇸'},{n:'Chine',f:'🇨🇳'},{n:'Inde',f:'🇮🇳'},{n:'Australie',f:'🇦🇺'},{n:'Mexique',f:'🇲🇽'},{n:'Russie',f:'🇷🇺'},{n:'Corée du Sud',f:'🇰🇷'},{n:'Maroc',f:'🇲🇦'},{n:'Égypte',f:'🇪🇬'},{n:'Thaïlande',f:'🇹🇭'},{n:'Argentine',f:'🇦🇷'},{n:'Portugal',f:'🇵🇹'},{n:'Suède',f:'🇸🇪'}];
function renderFlags(){if(G.flagIdx>=10)return `<div class="card" style="text-align:center;padding:24px"><div style="font-size:52px">🌍</div><div class="fredoka" style="font-size:22px;color:var(--purplel);margin:10px 0">Terminé !</div><div>Score: ${G.flagScore}/10</div><div style="margin-top:14px"><button class="btn btn-purple" onclick="G.flagScore=0;G.flagIdx=0;G.flagAnswered=false;initFlags();go('flags')">🔄</button></div></div>`;return `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px"><span style="font-size:13px;color:var(--text2)">${G.flagIdx+1}/10</span><span class="fredoka" style="font-size:18px;color:var(--yellow)">Score: ${G.flagScore}</span></div><div class="prog" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct(G.flagIdx,10)}%;background:linear-gradient(90deg,var(--purple),var(--cyan))"></div></div><div style="font-size:72px;text-align:center;margin:14px 0" id="fl-flag">${G.flagQ.f||'?'}</div><div id="fl-opts"></div><div id="fl-fb" style="display:none;padding:10px;border-radius:var(--rad);text-align:center;font-weight:800;font-size:14px;margin-top:6px"></div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-purple" id="fl-next" onclick="nextFlag()" disabled>Suivant →</button></div></div>`;}
function initFlags(){const sh=[...FLAGS].sort(()=>Math.random()-.5);const q=sh[0];const w=sh.slice(1,3);const opts=[q,...w].sort(()=>Math.random()-.5);G.flagQ={n:q.n,f:q.f,opts:opts.map(o=>o.n)};G.flagAnswered=false;const el=document.getElementById('fl-opts');if(el)el.innerHTML=G.flagQ.opts.map((o,i)=>`<button class="qopt" id="fo-${i}" onclick="answerFlag('${o}')">${o}</button>`).join('');}
function answerFlag(ans){if(G.flagAnswered)return;G.flagAnswered=true;const fb=document.getElementById('fl-fb');fb.style.display='block';if(ans===G.flagQ.n){G.flagScore++;fb.style.background='rgba(90,240,127,.15)';fb.style.color='var(--green)';fb.textContent='✅ Correct !';addCoins(8);addXP(6);}else{fb.style.background='rgba(240,90,90,.15)';fb.style.color='var(--redl)';fb.textContent='❌ C\'était '+G.flagQ.n;}document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);document.getElementById('fl-next').disabled=false;}
function nextFlag(){G.flagIdx++;G.flagAnswered=false;G.flagQ={};initFlags();go('flags');}
