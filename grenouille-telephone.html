<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grenouille</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #7ec0d8; }

  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #2a7a4a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="frog" cx="50%" cy="35%" r="65%"><stop offset="0%" stop-color="#8ad84a"/><stop offset="100%" stop-color="#5aa82a"/></radialGradient></defs>

<path d="M0 240 Q95 230 190 240 Q285 250 380 240 L380 340 L0 340 Z" fill="#4a9ab0"><animate attributeName="d" values="M0 240 Q95 230 190 240 Q285 250 380 240 L380 340 L0 340 Z;M0 240 Q95 250 190 240 Q285 230 380 240 L380 340 L0 340 Z;M0 240 Q95 230 190 240 Q285 250 380 240 L380 340 L0 340 Z" dur="3.5s" repeatCount="indefinite"/></path>

<ellipse cx="190" cy="285" rx="70" ry="20" fill="#3a9a3a"/>

<animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.5 1; 0.5 0 0.7 1"/>

<ellipse cx="150" cy="262" rx="16" ry="8" fill="#5aa82a"/><ellipse cx="230" cy="262" rx="16" ry="8" fill="#5aa82a"/>

<ellipse cx="190" cy="235" rx="52" ry="42" fill="url(#frog)"/>
<ellipse cx="190" cy="248" rx="34" ry="26" fill="#c8e89a"/>

<ellipse cx="168" cy="268" rx="10" ry="6" fill="#5aa82a"/><ellipse cx="212" cy="268" rx="10" ry="6" fill="#5aa82a"/>

<circle cx="165" cy="185" r="15" fill="#fff"/>

<circle cx="169" cy="184" r="3" fill="#fff"/><circle cx="215" cy="184" r="3" fill="#fff"/>

<circle cx="176" cy="216" r="2.5" fill="#2e6a2a"/><circle cx="204" cy="216" r="2.5" fill="#2e6a2a"/>
<ellipse cx="158" cy="212" rx="7" ry="5" fill="#ff9ac0" opacity="0.4"/><ellipse cx="222" cy="212" rx="7" ry="5" fill="#ff9ac0" opacity="0.4"/>
</g>

<g><animateTransform attributeName="transform" type="translate" values="0 0;280 -40;0 0" dur="8s" repeatCount="indefinite"/><g transform="translate(50 120)"><ellipse cx="0" cy="0" rx="4" ry="3" fill="#3a3a3a"/><ellipse cx="-3" cy="-2" rx="3" ry="1.5" fill="#cdeeff" opacity="0.7"/><ellipse cx="3" cy="-2" rx="3" ry="1.5" fill="#cdeeff" opacity="0.7"/></g></g>

<div id="hint">Ma grenouille 🐸</div>

</html>
