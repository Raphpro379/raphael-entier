<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lune endormie</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1030; }
  body { background: linear-gradient(to bottom, #0a1030 0%, #1a1a4a 55%, #2a1a4a 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #c8c0f0; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="moon" cx="42%" cy="35%" r="70%"><stop offset="0%" stop-color="#fff7d0"/><stop offset="100%" stop-color="#f0dd88"/></radialGradient></defs>
<g fill="#ffffff">
<circle cx="50" cy="50" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
<circle cx="120" cy="35" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="330" cy="45" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
<circle cx="300" cy="100" r="1"><animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite"/></circle>
<circle cx="60" cy="130" r="1.2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
<circle cx="340" cy="160" r="1"><animate attributeName="opacity" values="1;0.4;1" dur="2.9s" repeatCount="indefinite"/></circle>
<circle cx="40" cy="220" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="330" cy="250" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/></circle>
<circle cx="90" cy="280" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
</g>
<!-- etoile filante -->
<g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"><line x1="60" y1="70" x2="90" y2="80"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/><animate attributeName="x1" values="60;120" dur="3s" repeatCount="indefinite"/><animate attributeName="x2" values="90;150" dur="3s" repeatCount="indefinite"/><animate attributeName="y1" values="70;90" dur="3s" repeatCount="indefinite"/><animate attributeName="y2" values="80;100" dur="3s" repeatCount="indefinite"/></line></g>
<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- lune pleine ronde bien visible -->
<circle cx="190" cy="175" r="80" fill="url(#moon)"/>
<!-- crateres -->
<circle cx="150" cy="140" r="10" fill="#e8d070" opacity="0.5"/>
<circle cx="225" cy="150" r="8" fill="#e8d070" opacity="0.5"/>
<circle cx="215" cy="215" r="12" fill="#e8d070" opacity="0.5"/>
<circle cx="155" cy="205" r="7" fill="#e8d070" opacity="0.5"/>
<!-- visage endormi -->
<path d="M158 165 Q168 158 178 165" stroke="#c9a850" stroke-width="3.5" fill="none" stroke-linecap="round"/>
<path d="M202 165 Q212 158 222 165" stroke="#c9a850" stroke-width="3.5" fill="none" stroke-linecap="round"/>
<ellipse cx="150" cy="188" rx="8" ry="5" fill="#ffb6a0" opacity="0.5"/>
<ellipse cx="230" cy="188" rx="8" ry="5" fill="#ffb6a0" opacity="0.5"/>
<path d="M178 195 Q190 204 202 195" stroke="#c9a850" stroke-width="3" fill="none" stroke-linecap="round"/>
<!-- Zzz -->
<g fill="#fff7d0"><text x="255" y="130" font-size="22" font-family="sans-serif" font-weight="bold">z</text><text x="275" y="105" font-size="28" font-family="sans-serif" font-weight="bold">Z</text><text x="298" y="78" font-size="34" font-family="sans-serif" font-weight="bold">Z</text>
<animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></g>
</g>
</svg>
<div id="hint">Ma lune endormie 🌙</div>
</body>
</html>
