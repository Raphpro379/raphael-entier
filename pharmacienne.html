<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Pharmacienne</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#DFF6FF 0%,#F3FBF4 60%,#EAF7EC 100%);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;font-family:sans-serif;
  }
  svg{width:min(96vw,520px);height:auto;display:block;}

  /* ===== croix de pharmacie qui clignote ===== */
  .croix{animation:croix 1.6s ease-in-out infinite;}
  @keyframes croix{
    0%,100%{fill:#2ECC71;filter:drop-shadow(0 0 2px #2ECC71);}
    50%{fill:#7CF0A9;filter:drop-shadow(0 0 10px #58E68C);}
  }

  /* ===== la pharmacienne se balance doucement ===== */
  .pharma{transform-origin:250px 330px;animation:balance 3.4s ease-in-out infinite;}
  @keyframes balance{
    0%,100%{transform:rotate(-1.4deg);}
    50%{transform:rotate(1.4deg);}
  }

  /* ===== bras qui secoue la potion ===== */
  .bras-potion{transform-origin:292px 258px;animation:secoue 1.1s ease-in-out infinite;}
  @keyframes secoue{
    0%,100%{transform:rotate(0deg);}
    30%{transform:rotate(-14deg);}
    60%{transform:rotate(8deg);}
  }

  /* ===== liquide de la potion ===== */
  .liquide{animation:glou 1.1s ease-in-out infinite;}
  @keyframes glou{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-2.5px);}
  }

  /* ===== bulles qui montent de la potion ===== */
  .bulle{animation:monte 2.6s linear infinite;opacity:0;}
  .bulle.b2{animation-delay:.9s;}
  .bulle.b3{animation-delay:1.7s;}
  @keyframes monte{
    0%{transform:translateY(0);opacity:0;}
    15%{opacity:.9;}
    80%{opacity:.7;}
    100%{transform:translateY(-52px);opacity:0;}
  }

  /* ===== yeux qui clignent ===== */
  .oeil{transform-origin:center;animation:cligne 4.2s infinite;}
  @keyframes cligne{
    0%,92%,100%{transform:scaleY(1);}
    95%{transform:scaleY(.08);}
  }

  /* ===== étoiles magiques ===== */
  .etoile{animation:scintille 1.8s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
  .etoile.e2{animation-delay:.6s;}
  .etoile.e3{animation-delay:1.2s;}
  @keyframes scintille{
    0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}
    50%{opacity:1;transform:scale(1.15) rotate(25deg);}
  }

  /* ===== pilule qui saute sur le comptoir ===== */
  .pilule{transform-origin:150px 372px;animation:saute 2.2s ease-in-out infinite;}
  @keyframes saute{
    0%,20%,100%{transform:translateY(0) rotate(0deg);}
    8%{transform:translateY(-16px) rotate(180deg);}
    14%{transform:translateY(0) rotate(360deg);}
  }

  /* ===== cœur qui bat sur la blouse ===== */
  .coeur{transform-origin:center;transform-box:fill-box;animation:bat 1.3s ease-in-out infinite;}
  @keyframes bat{
    0%,100%{transform:scale(1);}
    12%{transform:scale(1.25);}
    24%{transform:scale(1);}
  }

  .titre{
    position:fixed;bottom:14px;left:0;right:0;text-align:center;
    font-weight:bold;color:#2E7D5B;font-size:clamp(15px,4vw,20px);
    text-shadow:0 1px 0 #fff;
  }
</style>
</head>
<body>

<svg viewBox="0 0 500 430" xmlns="http://www.w3.org/2000/svg">

  <!-- ============ DÉCOR : LA PHARMACIE ============ -->
  <!-- mur -->
  <rect x="0" y="0" width="500" height="430" fill="#F6FBF7"/>
  <rect x="0" y="0" width="500" height="66" fill="#CFEEDD"/>

  <!-- enseigne croix de pharmacie -->
  <g>
    <rect x="206" y="8" width="88" height="50" rx="10" fill="#1B4D3E"/>
    <path class="croix" d="M243 16 h14 v14 h14 v14 h-14 v14 h-14 v-14 h-14 v-14 h14 z"/>
  </g>

  <!-- étagères de gauche -->
  <g>
    <rect x="18" y="100" width="130" height="8" rx="4" fill="#B9DEC7"/>
    <rect x="30" y="70" width="18" height="30" rx="4" fill="#FF8FA3"/>
    <rect x="54" y="76" width="16" height="24" rx="4" fill="#7FB8F5"/>
    <rect x="76" y="66" width="20" height="34" rx="5" fill="#FFD166"/>
    <rect x="102" y="74" width="16" height="26" rx="4" fill="#9BE39B"/>
    <rect x="124" y="70" width="14" height="30" rx="4" fill="#C9A7F5"/>

    <rect x="18" y="170" width="130" height="8" rx="4" fill="#B9DEC7"/>
    <rect x="32" y="140" width="20" height="30" rx="9" fill="#FFB4C6"/>
    <rect x="58" y="146" width="16" height="24" rx="4" fill="#8ED6C0"/>
    <rect x="80" y="138" width="18" height="32" rx="4" fill="#7FB8F5"/>
    <rect x="104" y="144" width="20" height="26" rx="8" fill="#FFD166"/>
  </g>

  <!-- étagères de droite -->
  <g>
    <rect x="352" y="100" width="130" height="8" rx="4" fill="#B9DEC7"/>
    <rect x="362" y="72" width="18" height="28" rx="4" fill="#9BE39B"/>
    <rect x="386" y="66" width="20" height="34" rx="8" fill="#FF8FA3"/>
    <rect x="412" y="76" width="16" height="24" rx="4" fill="#FFD166"/>
    <rect x="434" y="70" width="18" height="30" rx="4" fill="#7FB8F5"/>

    <rect x="352" y="170" width="130" height="8" rx="4" fill="#B9DEC7"/>
    <rect x="364" y="142" width="16" height="28" rx="4" fill="#C9A7F5"/>
    <rect x="386" y="148" width="20" height="22" rx="7" fill="#8ED6C0"/>
    <rect x="412" y="140" width="16" height="30" rx="4" fill="#FF8FA3"/>
    <rect x="434" y="146" width="20" height="24" rx="4" fill="#FFD166"/>
  </g>

  <!-- ============ LA PHARMACIENNE ============ -->
  <g class="pharma">
    <!-- corps / blouse -->
    <path d="M210 250 q40 -26 80 0 l12 84 h-104 z" fill="#FFFFFF" stroke="#DDE7E0" stroke-width="2"/>
    <!-- col -->
    <path d="M236 246 l14 14 l14 -14" fill="none" stroke="#DDE7E0" stroke-width="3" stroke-linecap="round"/>
    <!-- petit cœur sur la blouse -->
    <path class="coeur" d="M231 292 c-5 -6 -14 -1 -11 6 c2 5 11 10 11 10 c0 0 9 -5 11 -10 c3 -7 -6 -12 -11 -6 z" fill="#FF6B81"/>

    <!-- bras gauche (posé) -->
    <path d="M214 258 q-24 20 -16 46" fill="none" stroke="#F5C9A8" stroke-width="13" stroke-linecap="round"/>
    <!-- manche gauche -->
    <path d="M212 254 q-12 10 -14 22" fill="none" stroke="#FFFFFF" stroke-width="17" stroke-linecap="round"/>

    <!-- tête -->
    <circle cx="250" cy="212" r="34" fill="#F5C9A8"/>
    <!-- cheveux (chignon) -->
    <path d="M216 208 a34 34 0 0 1 68 0 q0 -14 -10 -20 a36 36 0 0 0 -48 0 q-10 6 -10 20 z" fill="#6B4A34"/>
    <circle cx="250" cy="176" r="12" fill="#6B4A34"/>
    <!-- yeux -->
    <g class="oeil"><circle cx="238" cy="212" r="4" fill="#2B2D42"/></g>
    <g class="oeil"><circle cx="262" cy="212" r="4" fill="#2B2D42"/></g>
    <!-- joues -->
    <circle cx="230" cy="222" r="5" fill="#FFB4C6" opacity=".7"/>
    <circle cx="270" cy="222" r="5" fill="#FFB4C6" opacity=".7"/>
    <!-- sourire -->
    <path d="M240 228 q10 9 20 0" fill="none" stroke="#2B2D42" stroke-width="2.6" stroke-linecap="round"/>

    <!-- bras droit + potion (animé) -->
    <g class="bras-potion">
      <path d="M288 258 q26 8 30 -18" fill="none" stroke="#F5C9A8" stroke-width="13" stroke-linecap="round"/>
      <path d="M287 256 q14 5 20 -2" fill="none" stroke="#FFFFFF" stroke-width="17" stroke-linecap="round"/>
      <!-- fiole de potion -->
      <g>
        <rect x="308" y="196" width="14" height="12" rx="3" fill="#8ED6C0"/>
        <path d="M306 208 h18 l8 22 a17 17 0 0 1 -34 0 z" fill="#EAF9F3" stroke="#8ED6C0" stroke-width="2"/>
        <g class="liquide">
          <path d="M301 224 h28 a15 15 0 0 1 -28 0 z" fill="#B78BF0"/>
        </g>
        <!-- bulles -->
        <circle class="bulle"    cx="312" cy="222" r="3" fill="#D9C2FA"/>
        <circle class="bulle b2" cx="320" cy="224" r="2.4" fill="#D9C2FA"/>
        <circle class="bulle b3" cx="316" cy="220" r="2" fill="#EADAFD"/>
      </g>
    </g>
  </g>

  <!-- étoiles magiques autour de la potion -->
  <path class="etoile"    d="M352 186 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" fill="#FFD166"/>
  <path class="etoile e2" d="M338 158 l2.4 6.4 6.4 2.4 -6.4 2.4 -2.4 6.4 -2.4 -6.4 -6.4 -2.4 6.4 -2.4 z" fill="#FFB4C6"/>
  <path class="etoile e3" d="M372 214 l2 5.4 5.4 2 -5.4 2 -2 5.4 -2 -5.4 -5.4 -2 5.4 -2 z" fill="#8ED6C0"/>

  <!-- ============ COMPTOIR ============ -->
  <rect x="60" y="334" width="380" height="20" rx="8" fill="#79C99E"/>
  <rect x="74" y="354" width="352" height="60" rx="10" fill="#A8DDBE"/>
  <rect x="74" y="354" width="352" height="10" fill="#8FD1AC"/>

  <!-- pilule qui saute sur le comptoir -->
  <g class="pilule">
    <g transform="translate(150,322)">
      <rect x="-14" y="-8" width="28" height="16" rx="8" fill="#FF6B81"/>
      <path d="M0 -8 h14 a8 8 0 0 1 0 16 h-14 z" fill="#FFFFFF" stroke="#FFD3DB" stroke-width="1"/>
    </g>
  </g>

  <!-- boîte de médicaments posée -->
  <g>
    <rect x="336" y="308" width="52" height="28" rx="5" fill="#7FB8F5"/>
    <path d="M356 312 h12 v6 h6 v8 h-6 v6 h-12 v-6 h-6 v-8 h6 z" fill="#FFFFFF" transform="translate(-2,-1) scale(.9)" transform-origin="362 322"/>
  </g>

</svg>

<div class="titre">💊 La Pharmacienne ✨</div>

</body>
</html>
