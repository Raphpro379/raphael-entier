<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Volcan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #3a2040; }
  body {
    background: linear-gradient(to bottom, #4a2a50 0%, #8a3a4a 55%, #c9603a 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent;
  }
  svg { width: 94vw; max-width: 520px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #ffd6a8; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="lava" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff04a"/><stop offset="50%" stop-color="#ff8a1a"/><stop offset="100%" stop-color="#e0301a"/></linearGradient>
<linearGradient id="mount" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a4050"/><stop offset="100%" stop-color="#3a2838"/></linearGradient>
</defs>

<circle cx="60" cy="55" r="16" fill="#ffe0b0" opacity="0.7"/>
<g fill="#ffffff">
<circle cx="300" cy="45" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
<circle cx="330" cy="80" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="120" cy="40" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
</g>

<!-- fumee -->
<g fill="#6a5a6a" opacity="0.5">
<circle cx="190" cy="80" r="22"><animate attributeName="cy" values="90;40" dur="4s" repeatCount="indefinite"/><animate attributeName="r" values="18;34" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="210" cy="90" r="18"><animate attributeName="cy" values="95;50" dur="5s" repeatCount="indefinite"/><animate attributeName="r" values="14;30" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="172" cy="88" r="16"><animate attributeName="cy" values="92;46" dur="4.5s" repeatCount="indefinite"/><animate attributeName="r" values="12;28" dur="4.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="4.5s" repeatCount="indefinite"/></circle>
</g>

<!-- montagne -->
<path d="M60 300 L150 130 Q190 100 230 130 L320 300 Z" fill="url(#mount)"/>
<path d="M150 130 Q190 100 230 130 L215 300 L165 300 Z" fill="#4a3448" opacity="0.5"/>

<!-- cratere lave -->
<ellipse cx="190" cy="128" rx="42" ry="12" fill="#e0301a"/>
<ellipse cx="190" cy="126" rx="34" ry="8" fill="url(#lava)"><animate attributeName="opacity" values="0.8;1;0.8" dur="0.6s" repeatCount="indefinite"/></ellipse>

<!-- coulees de lave -->
<path d="M172 132 Q166 200 158 300" fill="none" stroke="url(#lava)" stroke-width="8" stroke-linecap="round"><animate attributeName="opacity" values="0.85;1;0.85" dur="1s" repeatCount="indefinite"/></path>
<path d="M210 132 Q220 210 232 300" fill="none" stroke="url(#lava)" stroke-width="7" stroke-linecap="round"><animate attributeName="opacity" values="1;0.8;1" dur="1.2s" repeatCount="indefinite"/></path>
<path d="M192 130 Q194 220 190 300" fill="none" stroke="url(#lava)" stroke-width="5" stroke-linecap="round"><animate attributeName="opacity" values="0.9;1;0.9" dur="0.9s" repeatCount="indefinite"/></path>

<!-- projections -->
<g fill="url(#lava)">
<circle cx="190" cy="120" r="6"><animate attributeName="cy" values="120;60;120" dur="1.4s" repeatCount="indefinite"/><animate attributeName="cx" values="190;175;190" dur="1.4s" repeatCount="indefinite"/></circle>
<circle cx="190" cy="120" r="5"><animate attributeName="cy" values="120;70;120" dur="1.7s" repeatCount="indefinite"/><animate attributeName="cx" values="190;208;190" dur="1.7s" repeatCount="indefinite"/></circle>
<circle cx="190" cy="120" r="4"><animate attributeName="cy" values="120;55;120" dur="1.2s" repeatCount="indefinite"/><animate attributeName="cx" values="190;195;190" dur="1.2s" repeatCount="indefinite"/></circle>
<circle cx="190" cy="120" r="4.5"><animate attributeName="cy" values="120;78;120" dur="1.9s" repeatCount="indefinite"/><animate attributeName="cx" values="190;168;190" dur="1.9s" repeatCount="indefinite"/></circle>
</g>

<rect x="0" y="298" width="380" height="42" fill="#3a2838"/>
<ellipse cx="190" cy="300" rx="150" ry="12" fill="#ff6a2a" opacity="0.3"/>
</svg>
<div id="hint">Mon volcan 🌋</div>
</body>
</html>
