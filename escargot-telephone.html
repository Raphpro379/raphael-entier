<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escargot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #cfe8b0; }
  body { background: linear-gradient(to bottom, #e0f4d0 0%, #cfe8b0 55%, #a8d080 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 92vw; max-width: 500px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #9a6a2a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="shell2" cx="45%" cy="40%" r="65%"><stop offset="0%" stop-color="#f0a850"/><stop offset="100%" stop-color="#c07828"/></radialGradient></defs>
<circle cx="315" cy="55" r="24" fill="#fff2c0" opacity="0.9"/>
<g><ellipse cx="80" cy="62" rx="28" ry="12" fill="#fff" opacity="0.7"/><ellipse cx="102" cy="55" rx="20" ry="10" fill="#fff" opacity="0.7"/><animateTransform attributeName="transform" type="translate" values="0 0;25 0;0 0" dur="15s" repeatCount="indefinite"/></g>
<!-- herbe / champignon -->
<rect x="0" y="285" width="380" height="55" fill="#8fc060"/>
<g fill="#7ab04a"><path d="M40 285 Q36 270 34 284 Z"/><path d="M340 285 Q336 270 334 284 Z"/><path d="M300 288 Q296 273 294 287 Z"/></g>
<g><ellipse cx="330" cy="278" rx="14" ry="9" fill="#e05a7a"/><rect x="326" y="278" width="8" height="12" rx="3" fill="#fff0e0"/><circle cx="326" cy="274" r="2" fill="#fff"/></g>
<!-- feuille sur laquelle il avance -->
<ellipse cx="190" cy="290" rx="150" ry="14" fill="#6aa83a" opacity="0.5"/>
<g>
<animateTransform attributeName="transform" type="translate" values="-30 0; 30 0; -30 0" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- corps -->
<path d="M120 285 Q110 260 140 258 Q180 256 200 262 Q210 265 208 275 Q205 285 190 285 Z" fill="#a8d86a"/>
<!-- tete -->
<ellipse cx="130" cy="262" rx="24" ry="20" fill="#b8e07a"/>
<!-- antennes -->
<g><animateTransform attributeName="transform" type="rotate" values="-4 122 245;4 122 245;-4 122 245" dur="2s" repeatCount="indefinite"/>
<line x1="122" y1="248" x2="116" y2="228" stroke="#a8d86a" stroke-width="3" stroke-linecap="round"/><circle cx="116" cy="226" r="4" fill="#7ab04a"/></g>
<g><animateTransform attributeName="transform" type="rotate" values="4 136 245;-4 136 245;4 136 245" dur="2.2s" repeatCount="indefinite"/>
<line x1="136" y1="248" x2="142" y2="226" stroke="#a8d86a" stroke-width="3" stroke-linecap="round"/><circle cx="142" cy="224" r="4" fill="#7ab04a"/></g>
<!-- visage -->
<circle cx="124" cy="260" r="4.5" fill="#2e2e2e"/><circle cx="140" cy="260" r="4.5" fill="#2e2e2e"/>
<circle cx="125.5" cy="258.5" r="1.5" fill="#fff"/><circle cx="141.5" cy="258.5" r="1.5" fill="#fff"/>
<path d="M124 270 Q132 276 140 270" stroke="#2e6a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
<ellipse cx="116" cy="268" rx="4" ry="3" fill="#ff9ac0" opacity="0.6"/><ellipse cx="148" cy="268" rx="4" ry="3" fill="#ff9ac0" opacity="0.6"/>
<!-- coquille en spirale -->
<circle cx="185" cy="240" r="42" fill="url(#shell2)"/>
<path d="M185 240 m0 0 a10 10 0 1 1 -14 6 a20 20 0 1 1 30 -4 a30 30 0 1 1 -42 8" fill="none" stroke="#8a5018" stroke-width="4"/>
<circle cx="185" cy="240" r="42" fill="none" stroke="#a86828" stroke-width="2" opacity="0.5"/>
</g>
<!-- trainee brillante -->
<g stroke="#e8f0ff" stroke-width="3" opacity="0.5" stroke-linecap="round" fill="none"><path d="M120 288 Q90 290 60 288"/></g>
</svg>
<div id="hint">Mon escargot 🐌</div>
</body>
</html>
