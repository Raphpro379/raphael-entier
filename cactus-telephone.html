<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cactus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #ffcf9a; }
  body { background: linear-gradient(to bottom, #ffd9a8 0%, #ffb877 55%, #e88a5a 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #4a8a3a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="cac" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5aba4a"/><stop offset="100%" stop-color="#3a8a2a"/></linearGradient></defs>
<circle cx="315" cy="60" r="30" fill="#fff2c0" opacity="0.9"/>
<g stroke="#ffe0a0" stroke-width="3" stroke-linecap="round" opacity="0.7"><line x1="315" y1="16" x2="315" y2="26"/><line x1="271" y1="60" x2="281" y2="60"/><line x1="349" y1="60" x2="359" y2="60"/></g>
<!-- dunes -->
<ellipse cx="90" cy="330" rx="150" ry="55" fill="#e0a860"/>
<ellipse cx="300" cy="335" rx="150" ry="55" fill="#d89850"/>
<rect x="0" y="305" width="380" height="35" fill="#d89850"/>
<!-- petit cactus -->
<g><path d="M300 305 L300 270 Q300 262 308 262 Q316 262 316 272 L316 305 Z" fill="url(#cac)"/><path d="M308 288 Q300 285 298 292" fill="none" stroke="#4a9a3a" stroke-width="6" stroke-linecap="round"/></g>
<g>
<animateTransform attributeName="transform" type="rotate" values="-2 190 305; 2 190 305; -2 190 305" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- bras gauche -->
<path d="M155 250 Q130 250 128 220 Q128 205 140 208 Q136 222 148 232 Q155 236 155 250 Z" fill="url(#cac)"/>
<!-- bras droit -->
<path d="M225 235 Q252 235 254 260 Q254 274 242 271 Q246 258 234 250 Q225 246 225 235 Z" fill="url(#cac)"/>
<!-- corps -->
<path d="M162 305 L162 180 Q162 150 190 150 Q218 150 218 180 L218 305 Z" fill="url(#cac)"/>
<!-- reliefs -->
<g stroke="#3a8a2a" stroke-width="2" opacity="0.4"><line x1="178" y1="170" x2="178" y2="300"/><line x1="202" y1="170" x2="202" y2="300"/></g>
<!-- epines -->
<g stroke="#e0f0a0" stroke-width="1.5" stroke-linecap="round"><line x1="164" y1="200" x2="158" y2="198"/><line x1="216" y1="220" x2="222" y2="218"/><line x1="164" y1="250" x2="158" y2="248"/><line x1="216" y1="260" x2="222" y2="258"/></g>
<!-- fleur sur la tete -->
<g><circle cx="190" cy="145" r="9" fill="#ff8fc8"/><circle cx="190" cy="145" r="4" fill="#ffd24a"/><g fill="#ff8fc8"><circle cx="182" cy="141" r="5"/><circle cx="198" cy="141" r="5"/><circle cx="185" cy="150" r="5"/><circle cx="195" cy="150" r="5"/></g><circle cx="190" cy="145" r="4" fill="#ffd24a"/></g>
<!-- visage rigolo -->
<circle cx="180" cy="205" r="6" fill="#2e4a2a"/><circle cx="200" cy="205" r="6" fill="#2e4a2a"/>
<circle cx="182" cy="203" r="2" fill="#fff"/><circle cx="202" cy="203" r="2" fill="#fff"/>
<path d="M178 222 Q190 234 202 222" stroke="#2e4a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
<ellipse cx="172" cy="216" rx="5" ry="3.5" fill="#ff9a8a" opacity="0.5"/><ellipse cx="208" cy="216" rx="5" ry="3.5" fill="#ff9a8a" opacity="0.5"/>
</g>
</svg>
<div id="hint">Mon cactus 🌵</div>
</body>
</html>
