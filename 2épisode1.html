  <div class="ecran" id="accueil">
    <div class="saison">SAISON 2 · ÉPISODE 1</div>
    <h1>Les Aventures d'Étincelle</h1>
    <h2>« L'étoile filante »</h2>
    <div class="duree">🌠 5 minutes · 5 chapitres · Un nouvel ami</div>
    <button class="btn" id="play">▶ Commencer</button>
  </div>

  <div class="ecran" id="fin">
    <h1>FIN DE L'ÉPISODE 1</h1>
    <p>La petite étoile a retrouvé sa famille dans le ciel ! 🌟<br>Et Hulotte le hibou rejoint l'équipe... À SUIVRE !</p>
    <button class="btn viol" id="rejouer">↻ Revoir l'épisode</button>
  </div>
</div>
<script>
const FILM = [
 {id:'a1', dur:60, subs:[
   [1,"Depuis la fin de l'Ombre, les nuits étaient paisibles."],
   [11,"Étincelle veillait sur la ville, perchée sur les toits."],
   [22,"Le chat noir ronronnait près d'elle, sous la lune."],
   [33,"Soudain, une traînée de feu déchira le ciel !"],
   [44,"« Une étoile filante ! » cria Étincelle. « Fais un vœu ! »"],
   [53,"Mais l'étoile ne passait pas... elle tombait vers la forêt."]]},
 {id:'a2', dur:60, subs:[
   [1,"BOUM ! Un grand éclair blanc, puis le silence."],
   [12,"Au fond d'un cratère fumant, une petite étoile tremblait."],
   [24,"Sa lumière vacillait, de plus en plus faible."],
   [35,"« Elle est blessée », murmura Étincelle, inquiète."],
   [45,"Alors, du haut d'un vieux chêne, une voix calme s'éleva."],
   [53,"« Je peux vous aider. Je suis Hulotte, le hibou sage. »"]]},
 {id:'a3', dur:60, subs:[
   [1,"Le hibou descendit, ses grands yeux dorés brillants."],
   [12,"« Cette étoile vient de très loin », dit-il doucement."],
   [24,"« Sans sa famille, sa lumière s'éteindra avant l'aube. »"],
   [35,"« Il faut la ramener tout en haut du ciel. »"],
   [45,"« Mais aucune étoile tombée n'est jamais remontée seule... »"],
   [53,"« Alors on va l'aider. Tous ensemble ! » dit Étincelle."]]},
 {id:'a4', dur:60, subs:[
   [1,"Direction le Mont des Nuages, tout là-haut."],
   [11,"Le chat portait la petite étoile contre sa fourrure."],
   [23,"Ils grimpèrent des sentiers escarpés sous la lune."],
   [34,"Le hibou les guidait par un passage secret."],
   [45,"Plus ils montaient, plus la petite étoile pâlissait."],
   [53,"« Tiens bon, courage, on y est presque ! »"]]},
 {id:'a5', dur:60, subs:[
   [1,"Au sommet, le vent hurlait dans les nuages."],
   [11,"La petite étoile ne brillait presque plus du tout."],
   [22,"Alors chacun lui offrit un peu de sa lumière."],
   [33,"Étincelle, Lueur, le chat, et le hibou réunis."],
   [44,"Ranimée, l'étoile s'éleva enfin vers les siennes ! 🌟"],
   [53,"« Bienvenue dans l'équipe, Hulotte ! » À SUIVRE..."]]}
];
const scenes = FILM.map(s=>document.getElementById(s.id));
const stEl=document.getElementById('soustitre'), chEl=document.getElementById('chapitre'), barre=document.getElementById('barre');
const total=FILM.reduce((a,s)=>a+s.dur,0);
let idx=0,t=0,timer=null,pause=false;
function tic(){
  const sc=FILM[idx];
  scenes.forEach((el,i)=>el.classList.toggle('on',i===idx));
  chEl.textContent='CHAPITRE '+(idx+1)+' / '+FILM.length;
  let cur=''; for(const [ts,txt] of sc.subs){ if(t>=ts) cur=txt; }
  if(stEl.textContent!==cur){ stEl.textContent=cur; stEl.classList.remove('on'); void stEl.offsetWidth; stEl.classList.add('on'); }
  const fil=document.getElementById('filante');
  if(idx===0 && t===44 && fil){ fil.classList.remove('go'); void fil.offsetWidth; fil.classList.add('go'); }
  let ec=0; for(let i=0;i<idx;i++) ec+=FILM[i].dur; ec+=t;
  barre.style.width=(ec/total*100)+'%';
  t++;
  if(t>=sc.dur){ t=0; idx++; if(idx>=FILM.length){ fin(); return; } }
}
function demarrer(){ document.getElementById('accueil').style.display='none'; document.getElementById('fin').style.display='none'; const fil=document.getElementById('filante'); if(fil) fil.classList.remove('go'); idx=0;t=0;pause=false; clearInterval(timer); timer=setInterval(()=>{if(!pause)tic();},1000); tic(); }
function fin(){ clearInterval(timer); document.getElementById('fin').style.display='flex'; }
document.getElementById('play').onclick=demarrer;
document.getElementById('rejouer').onclick=demarrer;
document.getElementById('pausebtn').onclick=function(){ pause=!pause; this.textContent=pause?'▶':'⏸'; };
</script>
