<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fleur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #cdeeff; }
  body { background: linear-gradient(to bottom, #dff4ff 0%, #cdeeff 45%, #a8e0b0 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #c85a9a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<circle cx="315" cy="55" r="24" fill="#fff2a8"/>

<g><ellipse cx="80" cy="65" rx="28" ry="12" fill="#fff" opacity="0.8"/><ellipse cx="102" cy="58" rx="20" ry="10" fill="#fff" opacity="0.8"/><animateTransform attributeName="transform" type="translate" values="0 0;25 0;0 0" dur="15s" repeatCount="indefinite"/></g>
<g fill="#5fb02f"><rect x="0" y="300" width="380" height="40"/></g>
<!-- tige -->
<path d="M190 302 Q186 240 190 190" stroke="#3a8a2a" stroke-width="6" fill="none" stroke-linecap="round"/>

<path d="M190 260 Q160 250 150 268 Q170 278 190 268 Z" fill="#4a9a3a"/></g>
<g><animateTransform attributeName="transform" type="rotate" values="0 190 230;-4 190 230;0 190 230" dur="3.4s" repeatCount="indefinite"/>
<path d="M190 238 Q220 228 230 246 Q210 256 190 246 Z" fill="#4a9a3a"/></g>
<!-- fleur qui s'ouvre -->
<g transform="translate(190 175)">
<g>
<animateTransform attributeName="transform" type="scale" values="0.3;1;1;0.3" dur="5s" repeatCount="indefinite" keyTimes="0;0.35;0.75;1" calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.5 0 0.5 1"/>
<g fill="#ff8fc8">
<ellipse cx="0" cy="-34" rx="15" ry="26"/>
<ellipse cx="0" cy="34" rx="15" ry="26"/>
<ellipse cx="-34" cy="0" rx="26" ry="15"/>
<ellipse cx="34" cy="0" rx="26" ry="15"/>
<ellipse cx="-24" cy="-24" rx="24" ry="15" transform="rotate(45 -24 -24)"/>
<ellipse cx="24" cy="-24" rx="24" ry="15" transform="rotate(-45 24 -24)"/>
<ellipse cx="-24" cy="24" rx="24" ry="15" transform="rotate(-45 -24 24)"/>
<ellipse cx="24" cy="24" rx="24" ry="15" transform="rotate(45 24 24)"/>
</g>
<g fill="#ffb3d8">
<ellipse cx="0" cy="-30" rx="9" ry="18"/><ellipse cx="0" cy="30" rx="9" ry="18"/>
<ellipse cx="-30" cy="0" rx="18" ry="9"/><ellipse cx="30" cy="0" rx="18" ry="9"/>
</g>
<circle cx="0" cy="0" r="18" fill="#ffd24a"/>
<g fill="#e0a020"><circle cx="-6" cy="-6" r="2.5"/><circle cx="6" cy="-6" r="2.5"/><circle cx="0" cy="6" r="2.5"/><circle cx="-6" cy="4" r="2.5"/><circle cx="6" cy="4" r="2.5"/></g>
</g>
</g>
<!-- papillon qui passe -->
<g><animateTransform attributeName="transform" type="translate" values="-40 0;420 -30" dur="10s" repeatCount="indefinite"/>
<g transform="translate(60 90)"><g><animateTransform attributeName="transform" type="scale" values="1 1;0.4 1;1 1" dur="0.3s" repeatCount="indefinite"/><ellipse cx="-6" cy="0" rx="7" ry="5" fill="#c98aff"/><ellipse cx="6" cy="0" rx="7" ry="5" fill="#c98aff"/></g><ellipse cx="0" cy="0" rx="2" ry="6" fill="#3a2a3a"/></g></g>
</svg>
<div id="hint">Ma fleur 🌸</div>
</body>
</html>
