<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f1efe8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:10px;--radius-lg:14px;
  --cp:#7F77DD;--cpl:#EEEDFE;--cpd:#3C3489;
  --ct:#1D9E75;--ctl:#E1F5EE;--ctd:#085041;
  --cc:#D85A30;--ccl:#FAECE7;--ccd:#712B13;
  --ck:#D4537E;--ckl:#FBEAF0;--ckd:#4B1528;
  --ca:#BA7517;--cal:#FAEEDA;--cad:#412402;
  --cb:#378ADD;--cbl:#E6F1FB;--cbd:#042C53;
  --cr:#E24B4A;--crl:#FCEBEB;--crd:#501313;
  --cg:#888780;--cgl:#F1EFE8;--cgd:#2C2C2A;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
[data-theme="dark"]{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2c2c2a;
  --text:#f0ede8;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --cpl:#26215C;--cpd:#EEEDFE;
  --ctl:#04342C;--ctd:#E1F5EE;
  --ccl:#4A1B0C;--ccd:#FAECE7;
  --ckl:#4B1528;--ckd:#FBEAF0;
  --cal:#412402;--cad:#FAEEDA;
  --cbl:#042C53;--cbd:#E6F1FB;
  --crl:#501313;--crd:#FCEBEB;
  --cgl:#2C2C2A;--cgd:#F1EFE8;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background 0.3s,color 0.3s}

/* Layout */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;transition:width 0.25s}
.sidebar.collapsed{width:60px}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:0.5px solid var(--border);min-height:60px}
.app-logo{width:32px;height:32px;border-radius:8px;background:var(--cp);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.app-logo-text{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden}
.sidebar-section{padding:8px;flex:1;overflow-y:auto}
.nav-group-label{font-size:11px;color:var(--text3);padding:6px 8px 4px;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;overflow:hidden}
.collapsed .nav-group-label{opacity:0;height:0;padding:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;color:var(--text2);border:none;background:transparent;width:100%;text-align:left;font-size:13px;font-family:inherit;white-space:nowrap;overflow:hidden;position:relative}
.nav-item i{font-size:18px;flex-shrink:0}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--cbl);color:var(--cb)}
.nav-item.active.kid{background:var(--cpl);color:var(--cp)}
.nav-item .badge-count{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--cr);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:500}
.collapsed .nav-item span{display:none}
.collapsed .badge-count{right:4px;top:6px;transform:none}
.sidebar-footer{padding:8px;border-top:0.5px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;border-bottom:0.5px solid var(--border);background:var(--bg2);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-actions{display:flex;gap:6px;align-items:center}
.mode-pills{display:flex;border-radius:20px;overflow:hidden;border:0.5px solid var(--border2)}
.mode-pill{padding:4px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;transition:all 0.15s}
.mode-pill.active-pro{background:var(--cb);color:#fff}
.mode-pill.active-kid{background:var(--cp);color:#fff}
.icon-btn{width:34px;height:34px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all 0.15s;font-size:18px}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.page{flex:1;overflow-y:auto;padding:20px}
.page-section{display:none}
.page-section.active{display:block}

/* Cards & grids */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg3);border-radius:var(--radius);padding:14px;text-align:center}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--text)}
.stat-sub{font-size:11px;margin-top:3px}

/* Forms */
input,select,textarea{border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;font-size:13px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none;width:100%;transition:border 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--cb)}
textarea{resize:vertical;min-height:80px}
.inp-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
.inp-row input,.inp-row select{flex:1}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-group{margin-bottom:12px}

/* Buttons */
.btn{padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--border);filter:brightness(0.97)}
.btn-primary{background:var(--cb);border-color:var(--cb);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-success{background:var(--ct);border-color:var(--ct);color:#fff}
.btn-danger{background:var(--cr);border-color:var(--cr);color:#fff}
.btn-kid{background:var(--cp);border-color:var(--cp);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;font-size:16px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 10px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);background:var(--bg3)}
.tbl td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.tbl .actions{display:flex;gap:4px}

/* Badges */
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;display:inline-block;white-space:nowrap}
.badge-blue{background:var(--cbl);color:var(--cbd)}
.badge-green{background:var(--ctl);color:var(--ctd)}
.badge-red{background:var(--crl);color:var(--crd)}
.badge-amber{background:var(--cal);color:var(--cad)}
.badge-gray{background:var(--cgl);color:var(--cgd)}
.badge-purple{background:var(--cpl);color:var(--cpd)}
.badge-pink{background:var(--ckl);color:var(--ckd)}
.badge-coral{background:var(--ccl);color:var(--ccd)}

/* Progress */
.progress{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.4s}

/* Row items */
.list-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.list-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:#fff}

/* Charts */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:8px}
.bar-chart .bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.3s}
.chart-labels{display:flex;gap:4px;margin-top:4px}
.chart-label{flex:1;text-align:center;font-size:10px;color:var(--text3)}

/* Inline editable */
.editable{cursor:text;border-bottom:1px dashed transparent;transition:border 0.15s;display:inline}
.editable:hover{border-bottom-color:var(--border2)}
.editable:focus{outline:none;border-bottom-color:var(--cb)}

/* Notifications toast */
.toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;pointer-events:all;min-width:220px;transform:translateX(120%);transition:transform 0.3s}
.toast.show{transform:translateX(0)}
.toast i{font-size:16px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:20px;width:90%;max-width:480px;border:0.5px solid var(--border);box-shadow:var(--shadow)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:500}

/* Kanban */
.kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.kanban-col{background:var(--bg3);border-radius:var(--radius-lg);padding:10px;min-height:160px}
.kanban-header{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kanban-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:7px;cursor:pointer;transition:border 0.15s;font-size:13px}
.kanban-card:hover{border-color:var(--border2)}

/* Weather */
.weather-icon{font-size:48px;text-align:center;display:block;margin:8px 0}

/* Kid specific */
.pet-emoji{font-size:72px;display:block;text-align:center;cursor:pointer;user-select:none;transition:transform 0.15s}
.pet-emoji:active{transform:scale(0.9)}
.star-count{color:var(--ca);font-weight:500}
.xp-bar{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden}
.xp-fill{height:100%;border-radius:5px;background:var(--cp);transition:width 0.4s}
.mood-face{font-size:36px;cursor:pointer;padding:8px;border-radius:50%;transition:all 0.15s;display:inline-block}
.mood-face:hover,.mood-face.selected{background:var(--cpl);transform:scale(1.15)}
.shop-item{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;text-align:center;transition:border 0.15s}
.shop-item.owned{border-color:var(--ct);background:var(--ctl)}
.quiz-opt{display:block;width:100%;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.15s;margin-bottom:7px}
.quiz-opt:hover{border-color:var(--cp);background:var(--cpl)}
.quiz-opt.correct{border-color:var(--ct);background:var(--ctl);color:var(--ctd)}
.quiz-opt.wrong{border-color:var(--cr);background:var(--crl);color:var(--crd)}
.trophy-card{border-radius:var(--radius-lg);padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;border:0.5px solid var(--border)}
.trophy-card.unlocked{background:var(--cal);border-color:var(--ca)}

/* Responsive tabs for sub-sections */
.tab-bar{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all 0.15s;border:none;background:transparent;font-family:inherit}
.tab.active{color:var(--cb);border-bottom-color:var(--cb)}
.tab-content{display:none}
.tab-content.active{display:block}
.tab.active.kid-tab{color:var(--cp);border-bottom-color:var(--cp)}

/* Notification bell bubble */
.notif-dot{width:7px;height:7px;background:var(--cr);border-radius:50%;position:absolute;top:4px;right:4px}

/* Search highlight */
.highlight{background:var(--cal);border-radius:3px}

/* Dark/light toggle icon swap */
.icon-sun,.icon-moon{transition:opacity 0.2s}
[data-theme="dark"] .icon-sun{display:none}
[data-theme="light"] .icon-moon{display:none}
.icon-moon{display:none}
[data-theme="dark"] .icon-moon{display:flex}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

/* ===== UTILS ===== */
function fmtEur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}
function fmtTimer(s){const m=Math.floor(s/60),sc=s%60;return(m<10?'0':'')+m+':'+(sc<10?'0':'')+sc}
function uid(){return++S.nextId}
function pct(a,b){return b?Math.round(a/b*100):0}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ===== TOAST ===== */
function toast(msg, type='info'){
  const colors={info:'var(--cb)',success:'var(--ct)',warning:'var(--ca)',error:'var(--cr)'};
  const icons={info:'ti-info-circle',success:'ti-circle-check',warning:'ti-alert-triangle',error:'ti-alert-circle'};
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<i class="ti ${icons[type]}" style="color:${colors[type]}"></i><span>${esc(msg)}</span><button class="btn btn-sm btn-icon" style="margin-left:auto;flex-shrink:0" onclick="this.parentElement.remove()"><i class="ti ti-x"></i></button>`;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400)},3500);
}

/* ===== MODAL ===== */
function openModal(title, html){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}

/* ===== THEME ===== */
function toggleTheme(){
  const t=document.body.dataset.theme==='dark'?'light':'dark';
  document.body.dataset.theme=t;
  const sun=document.querySelector('.icon-sun');
  const moon=document.querySelector('.icon-moon');
  if(t==='dark'){sun.style.display='none';moon.style.display='flex';}
  else{sun.style.display='flex';moon.style.display='none';}
  toast(t==='dark'?'Mode sombre activé':'Mode clair activé','info');
}

/* ===== SIDEBAR ===== */
function toggleSidebar(){
  S.sidebarCollapsed=!S.sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',S.sidebarCollapsed);
}

/* ===== NAV ===== */
function buildNav(){
  const nav=S.mode==='pro'?PRO_NAV:KID_NAV;
  const isKid=S.mode==='kid';
  const html=nav.map(item=>{
    if(item.group) return `<div class="nav-group-label">${item.group}</div>`;
    const active=S.currentSection===item.id?'active'+(isKid?' kid':''):'';
    const badge=item.badge?`<span class="badge-count">${item.badge}</span>`:'';
    return `<button class="nav-item ${active}" onclick="navigateTo('${item.id}')"><i class="ti ${item.icon}" aria-hidden="true"></i><span>${item.label}</span>${badge}</button>`;
  }).join('');
  document.getElementById('sidebar-nav').innerHTML=html;
}

/* ===== NAVIGATION ===== */
function navigateTo(id){
  S.currentSection=id;
  buildNav();
  renderPage();
  const allNav=[...PRO_NAV,...KID_NAV];
  const item=allNav.find(n=>n.id===id);
  if(item) document.getElementById('topbar-title').textContent=item.label;
}

/* ===== MODE SWITCH ===== */
function switchMode(m){
  S.mode=m;
  document.getElementById('pill-pro').className='mode-pill'+(m==='pro'?' active-pro':'');
  document.getElementById('pill-kid').className='mode-pill'+(m==='kid'?' active-kid':'');
  S.currentSection=m==='pro'?'dashboard':'khome';
  buildNav();
  renderPage();
  document.getElementById('topbar-title').textContent=m==='pro'?'Dashboard':'Accueil';
}

/* ===== INLINE EDIT ===== */
function makeEditable(el){
  const oldText=el.textContent;
  el.contentEditable='true';
  el.focus();
  el.addEventListener('blur',function done(){
    el.contentEditable='false';
    el.removeEventListener('blur',done);
    if(el.textContent!==oldText) toast('Modifié avec succès','success');
  },{once:true});
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}});
}
document.addEventListener('click',e=>{
  if(e.target.classList.contains('editable')) makeEditable(e.target);
});

/* ===== GLOBAL SEARCH ===== */
document.getElementById('global-search').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q)return;
  const results=[];
  S.clients.forEach(c=>{if(c.nom.toLowerCase().includes(q))results.push({label:c.nom,section:'crm'})});
  S.stocks.forEach(st=>{if(st.nom.toLowerCase().includes(q))results.push({label:st.nom,section:'stock'})});
  if(results.length) toast(`${results.length} résultat(s) pour "${q}"... navigue vers la section !`,'info');
});

function caisseRemove(i){S.caisse.items.splice(i,1);navigateTo('caisse');}
function deleteSale(id){S.lastSales=S.lastSales.filter(v=>v.id!==id);navigateTo('caisse');toast('Vente supprimée','success');}
function caisseAdd(){
  const id=parseInt(document.getElementById('caisse-prod').value);
  const s=S.stocks.find(x=>x.id===id);
  if(!s)return;
  const existing=S.caisse.items.find(x=>x.nom===s.nom);
  if(existing)existing.qte++;
  else S.caisse.items.push({nom:s.nom,prix:s.prix,qte:1});
  navigateTo('caisse');
}
function validatePayment(method,total){
  S.caisse.items=[];

}

function renderKTasks(){
  const done=S.tasks.filter(t=>t.done).length;
  const p=pct(done,S.tasks.length);
  return `
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="ktask-inp" placeholder="Nouvelle mission..." onkeydown="if(event.key==='Enter')addKTask()" style="flex:1">
    <select id="ktask-priority" style="width:auto"><option value="normale">Normale</option><option value="haute">Haute</option><option value="basse">Basse</option></select>
    <button class="btn btn-kid" onclick="addKTask()"><i class="ti ti-plus"></i></button>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0"><i class="ti ti-checkbox" aria-hidden="true"></i>Mes missions</div>
      <span style="font-size:12px;color:var(--text3)">${done}/${S.tasks.length} complétées</span>
    </div>
    ${S.tasks.map((t,i)=>{
      const pc={haute:'badge-red',normale:'badge-blue',basse:'badge-gray'}[t.priority]||'badge-gray';
      return `<div class="list-row">
        <div style="width:24px;height:24px;border-radius:7px;border:2px solid ${t.done?'var(--ct)':'var(--border2)'};background:${t.done?'var(--ct)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" onclick="toggleKTask(${i})">
          ${t.done?'<i class="ti ti-check" style="font-size:13px;color:#fff" aria-hidden="true"></i>':''}
        </div>
        <span style="flex:1;font-size:14px;${t.done?'text-decoration:line-through;color:var(--text3)':''}" data-editable>${esc(t.text)}</span>
        ${t.done?'<span style="font-size:16px">⭐</span>':''}
        <span class="badge ${pc}">${t.priority}</span>
        <button class="btn btn-sm btn-icon" style="color:var(--cr)" onclick="removeKTask(${i})"><i class="ti ti-trash"></i></button>
      </div>`;
    }).join('')}
    <div class="progress" style="margin-top:12px;height:10px"><div class="progress-fill" style="width:${p}%;background:var(--cp)"></div></div>
    <div style="font-size:12px;color:var(--text3);margin-top:5px;text-align:right">${p} % accompli</div>
    ${p===100&&S.tasks.length>0?'<div style="text-align:center;margin-top:10px;font-size:14px;padding:10px;background:var(--ctl);border-radius:var(--radius);color:var(--ctd)">Bravo ! Toutes les missions sont accomplies ! 🎉</div>':''}
  </div>`;
}
function addKTask(){
  const inp=document.getElementById('ktask-inp');
  const priority=document.getElementById('ktask-priority').value;
  const text=inp.value.trim();
  if(!text)return;
  S.tasks.push({id:uid(),text,done:false,priority,due:''});
  inp.value='';
  navigateTo('ktasks');
}
function toggleKTask(i){
  const was=S.tasks[i].done;
  S.tasks[i].done=!was;
  if(!was){S.stars++;S.xp=clamp(S.xp+5,0,100);toast('Mission accomplie ! +1 étoile ⭐','success');}
  navigateTo('ktasks');
}
function removeKTask(i){S.tasks.splice(i,1);navigateTo('ktasks');}

function renderKQuiz(){
  if(S.qIdx>=S.quizData.length) return `
  <div class="card" style="text-align:center;padding:24px">
    <div style="font-size:56px">🎉</div>
    <div style="font-size:17px;font-weight:500;margin-top:8px">Quiz terminé !</div>
    <div style="font-size:14px;color:var(--text2);margin-top:6px">Score : ${S.qScore} / ${S.quizData.length}</div>
    <div style="font-size:13px;color:var(--ca);margin-top:4px">Tu as gagné ${S.qScore*4} étoiles !</div>
    <button class="btn btn-kid" style="margin-top:16px" onclick="S.qIdx=0;S.qScore=0;S.qAnswered=false;navigateTo('kquiz')"><i class="ti ti-refresh"></i> Recommencer</button>
  </div>`;
  const q=S.quizData[S.qIdx];
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="badge badge-purple">${q.cat}</span>
      <div style="font-size:13px;color:var(--text2)">Question ${S.qIdx+1} / ${S.quizData.length}</div>
      <div style="font-size:13px;color:var(--ca);font-weight:500">⭐ ${S.qScore*4}</div>
    </div>
    <div class="progress" style="margin-bottom:14px"><div class="progress-fill" style="width:${pct(S.qIdx,S.quizData.length)}%;background:var(--cp)"></div></div>
    <div style="font-size:16px;font-weight:500;color:var(--text);margin-bottom:16px;line-height:1.5">${esc(q.q)}</div>
    ${q.opts.map((o,i)=>`<button class="quiz-opt" id="qopt-${i}" onclick="answerKQuiz(${i})">${esc(o)}</button>`).join('')}
    <div id="kquiz-fb" style="display:none;font-size:13px;padding:10px;border-radius:var(--radius);text-align:center;margin-top:6px"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-kid" id="kquiz-next" onclick="S.qIdx++;S.qAnswered=false;navigateTo('kquiz')" disabled>Suivant →</button>
    </div>
  </div>`;
}
function answerKQuiz(i){
  if(S.qAnswered)return;
  S.qAnswered=true;
  const q=S.quizData[S.qIdx];
  document.querySelectorAll('.quiz-opt').forEach((b,j)=>{
    if(j===q.a)b.classList.add('correct');
    else if(j===i&&i!==q.a)b.classList.add('wrong');
    b.disabled=true;
  });
  const fb=document.getElementById('kquiz-fb');
  fb.style.display='block';
  if(i===q.a){S.qScore++;S.stars+=4;S.xp=clamp(S.xp+10,0,100);fb.style.background='var(--ctl)';fb.style.color='var(--ctd)';fb.textContent='Bravo ! Bonne réponse ! +4 étoiles ⭐';}
  else{fb.style.background='var(--crl)';fb.style.color='var(--crd)';fb.textContent='Pas tout à fait... La réponse était : '+q.opts[q.a];}
  document.getElementById('kquiz-next').disabled=false;
}

function feedPet(){S.hunger=clamp(S.hunger+20,0,100);S.stars++;navigateTo('kpet');petMsg('Miam miam ! Merci ! 😋');}

function sleepPet(){S.energy=clamp(S.energy+30,0,100);navigateTo('kpet');petMsg('Zzz... Je me repose... 😴');}
function changePet(){S.petIdx=(S.petIdx+1)%S.pets.length;navigateTo('kpet');}
function petTap(){const e=document.getElementById('pet-emoji');if(e){e.style.transform='scale(1.25)';setTimeout(()=>e.style.transform='',200);}toast('Ronron... 💕','info');}

function renderKTimer(){
  return `
  <div class="card">
    <div class="card-title"><i class="ti ti-clock" aria-hidden="true"></i>Minuteur</div>
    <div class="timer-big" id="ktimer-display" style="font-size:52px;font-weight:500;text-align:center;letter-spacing:2px;margin:12px 0;color:var(--text)">${fmtTimer(S.timerSec)}</div>
    <div class="progress" style="margin-bottom:16px">
      <div class="progress-fill" style="width:${pct(S.timerInit-S.timerSec,S.timerInit)}%;background:var(--cp)" id="ktimer-progress"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap">
      ${[[5,'5 min'],[10,'10 min'],[15,'15 min'],[25,'25 min'],[45,'45 min']].map(([s,l])=>`<button class="btn" onclick="setKTimer(${s*60})">${l}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-kid" style="min-width:120px" id="ktimer-start-btn" onclick="toggleKTimer()"><i class="ti ti-player-play"></i> Démarrer</button>
      <button class="btn" onclick="resetKTimer()"><i class="ti ti-refresh"></i> Réinitialiser</button>
    </div>
    <div style="font-size:13px;color:var(--text2);text-align:center;margin-top:10px" id="ktimer-label">Prêt !</div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-bolt" aria-hidden="true"></i>Suggestions d'activités</div>
    ${[['📚','Devoirs',25],['🎨','Dessin',15],['📖','Lecture',20],['🧘','Détente',5],['🎮','Jeu éducatif',30]].map(([icon,name,min])=>`
    <div class="list-row">
      <span style="font-size:20px">${icon}</span>
      <span style="flex:1;font-size:13px">${name}</span>
      <button class="btn btn-sm" onclick="setKTimer(${min*60})">${min} min</button>
    </div>`).join('')}
  </div>`;
}
function setKTimer(s){
  if(S.timerRunning){clearInterval(S.timerIv);S.timerRunning=false;}
  S.timerSec=s;S.timerInit=s;
  const d=document.getElementById('ktimer-display');
  if(d)d.textContent=fmtTimer(s);
  const btn=document.getElementById('ktimer-start-btn');
  if(btn)btn.innerHTML='<i class="ti ti-player-play"></i> Démarrer';
}
function toggleKTimer(){
  if(S.timerRunning){
    clearInterval(S.timerIv);S.timerRunning=false;
    const btn=document.getElementById('ktimer-start-btn');
    if(btn)btn.innerHTML='<i class="ti ti-player-play"></i> Reprendre';
  }else{
    S.timerRunning=true;
    const btn=document.getElementById('ktimer-start-btn');
    if(btn)btn.innerHTML='<i class="ti ti-player-pause"></i> Pause';
    const label=document.getElementById('ktimer-label');
    if(label)label.textContent='En cours... Courage !';
    S.timerIv=setInterval(()=>{
      if(S.timerSec<=0){
        clearInterval(S.timerIv);S.timerRunning=false;
        S.stars+=2;S.xp=clamp(S.xp+5,0,100);
        toast('Minuteur terminé ! Bravo ! +2 étoiles ⭐','success');
        const lb=document.getElementById('ktimer-label');
        if(lb)lb.textContent='Terminé ! Bravo ! 🎉';
        const b=document.getElementById('ktimer-start-btn');
        if(b)b.innerHTML='<i class="ti ti-player-play"></i> Démarrer';
      }else{
        S.timerSec--;
        const d=document.getElementById('ktimer-display');
        if(d)d.textContent=fmtTimer(S.timerSec);
        const p=document.getElementById('ktimer-progress');
        if(p)p.style.width=pct(S.timerInit-S.timerSec,S.timerInit)+'%';
      }
    },1000);
  }
}
function resetKTimer(){
  clearInterval(S.timerIv);S.timerRunning=false;
  S.timerSec=S.timerInit;
  const d=document.getElementById('ktimer-display');if(d)d.textContent=fmtTimer(S.timerSec);
  const p=document.getElementById('ktimer-progress');if(p)p.style.width='0%';
  const b=document.getElementById('ktimer-start-btn');if(b)b.innerHTML='<i class="ti ti-player-play"></i> Démarrer';
  const l=document.getElementById('ktimer-label');if(l)l.textContent='Prêt !';
}

function renderKNotes(){
  return `
  <div class="card">
    <div class="card-title"><i class="ti ti-notes" aria-hidden="true"></i>Mon journal secret 🔒</div>
    <div class="form-group"><input id="knote-title" placeholder="Titre de l'entrée (optionnel)"></div>
    <div class="form-group"><textarea id="knote-area" placeholder="Raconte ta journée, tes rêves, ce qui te fait sourire..." style="min-height:100px"></textarea></div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
      <span style="font-size:13px;color:var(--text2)">Couleur :</span>
      ${S.noteColors.map((c,i)=>`<button onclick="S.noteColor=${i};updateNoteColors()" style="width:24px;height:24px;border-radius:50%;background:${c.b};border:2px solid ${S.noteColor===i?'var(--text)':'transparent'};cursor:pointer" title="Couleur ${i+1}"></button>`).join('')}
      <button class="btn btn-kid" style="margin-left:auto" onclick="saveKNote()"><i class="ti ti-lock"></i> Sauvegarder</button>
    </div>
  </div>
  <div id="knotes-list">
    ${S.kidNotes.map(n=>`
    <div style="background:${n.bg};border-left:4px solid ${n.b};border-radius:var(--radius-lg);padding:14px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${n.date}</div>
      ${n.title?`<div style="font-size:14px;font-weight:500;color:${n.t};margin-bottom:4px">${esc(n.title)}</div>`:''}
      <div style="font-size:13px;line-height:1.6;color:${n.t}">${esc(n.text)}</div>
    </div>`).join('')}
    ${S.kidNotes.length===0?'<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">Ton journal est vide. Commence à écrire !</div>':''}
  </div>`;
}
function updateNoteColors(){navigateTo('knotes');}
function saveKNote(){
  const text=document.getElementById('knote-area').value.trim();
  if(!text){toast('Écris quelque chose d\'abord !','error');return;}
  const title=document.getElementById('knote-title').value.trim();
  const c=S.noteColors[S.noteColor];
  const now=new Date();
  S.kidNotes.unshift({title,text,date:now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),bg:c.bg,b:c.b,t:c.t});
  S.stars++;S.xp=clamp(S.xp+5,0,100);
  navigateTo('knotes');
  toast('Journal mis à jour ! +1 étoile ⭐','success');
}

  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">

    <div class="shop-item">

      }

function buyShopItem(i){
  const it=S.shopItems[i];
  if(S.stars>=it.prix&&!it.owned){
    S.stars-=it.prix;it.owned=true;
    navigateTo('kshop');
    toast(`"${it.name}" acheté ! 🎉`,'success');
  }else if(it.owned){
    toast('Tu possèdes déjà cet article !','info');
  }else{
    toast(`Il te manque ${it.prix-S.stars} étoiles...`,'error');
  }
}

      ${[...S.moodHistory,S.selectedMood>=0?S.selectedMood:1].slice(-7).map((m,i)=>`
      <div class="bar" style="height:${100-m*22}%;background:${i===6?'var(--cp)':'var(--cpl)'};position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:2px">
        <span style="font-size:14px">${S.moods[m]}</span>
      </div>`).join('')}
    </div>
    <div class="chart-labels">${['L','M','M','J','V','S','Auj.'].map(d=>`<div class="chart-label">${d}</div>`).join('')}</div>
  </div>`;
}
function selectMood(i){S.selectedMood=i;navigateTo('kmood');}
function saveMood(){
  if(S.selectedMood<0){toast('Choisis une humeur d\'abord !','error');return;}
  S.moodHistory.push(S.selectedMood);
  S.stars++;S.xp=clamp(S.xp+3,0,100);
  toast('Humeur enregistrée ! +1 étoile ⭐','success');
}

function renderKRecipes(){
  return `
  <div class="card">
    <div class="card-title"><i class="ti ti-chef-hat" aria-hidden="true"></i>Recettes faciles</div>
    ${S.recipes.map(r=>`
    <div class="list-row" style="cursor:pointer" onclick="toast('Recette ${esc(r.nom)} ouverte !','info')">
      <span style="font-size:28px">${r.icon}</span>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${esc(r.nom)}</div>
        <div style="font-size:12px;color:var(--text2)"><i class="ti ti-clock" aria-hidden="true"></i> ${r.temps} min · <i class="ti ti-users" aria-hidden="true"></i> ${r.pers} pers.</div>
      </div>
      <span class="badge badge-purple">${esc(r.tag)}</span>
    </div>`).join('')}
  </div>
  <div class="card" style="background:var(--ctl);border-color:var(--ct)">
    <div class="card-title" style="color:var(--ctd)"><i class="ti ti-bulb" aria-hidden="true"></i>Conseil du jour</div>
    <div style="font-size:13px;color:var(--ctd)">Lave toujours tes mains avant de cuisiner ! Et demande à un adulte avant d'utiliser le four. 👨‍🍳</div>
  </div>`;
}

function renderKFitness(){
  const done=S.workouts.filter(w=>w.done).length;
  return `
  <div class="grid-3" style="margin-bottom:14px">
    <div class="stat-card" style="background:var(--cpl);border:0.5px solid var(--cp)"><div class="stat-label" style="color:var(--cpd)">Exercices faits</div><div class="stat-val" style="color:var(--cpd)">${done}/${S.workouts.length}</div></div>
    <div class="stat-card" style="background:var(--ctl);border:0.5px solid var(--ct)"><div class="stat-label" style="color:var(--ctd)">Calories</div><div class="stat-val" style="color:var(--ctd)">${done*45}</div></div>
    <div class="stat-card" style="background:var(--cal);border:0.5px solid var(--ca)"><div class="stat-label" style="color:var(--cad)">Streak</div><div class="stat-val" style="color:var(--cad)">🔥 ${done}</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-run" aria-hidden="true"></i>Programme du jour — Full body</div>
    ${S.workouts.map((w,i)=>`
    <div class="list-row">
      <div style="width:26px;height:26px;border-radius:8px;border:2px solid ${w.done?'var(--ct)':'var(--border2)'};background:${w.done?'var(--ct)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0" onclick="toggleWorkout(${i})">
        ${w.done?'<i class="ti ti-check" style="font-size:13px;color:#fff" aria-hidden="true"></i>':''}
      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;${w.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(w.nom)}</div>
        <div style="font-size:12px;color:var(--text2)">${esc(w.sets)} · ${esc(w.cat)}</div>
      </div>
      ${w.done?'<span class="badge badge-green">Fait !</span>':'<span class="badge badge-gray">À faire</span>'}
    </div>`).join('')}
    ${pct(done,S.workouts.length)===100?'<div style="text-align:center;padding:12px;font-size:14px;background:var(--ctl);border-radius:var(--radius);margin-top:8px;color:var(--ctd)">Entraînement terminé ! Bravo champion(ne) ! 🏆</div>':''}
  </div>`;
}
function toggleWorkout(i){
  S.workouts[i].done=!S.workouts[i].done;
  if(S.workouts[i].done){S.stars++;toast(`${S.workouts[i].nom} accompli ! +1 étoile ⭐`,'success');}
  navigateTo('kfitness');
}

function renderKTrophees(){
  const trophees=[
    {name:'Première étoile',desc:'Gagner 1 étoile',icon:'⭐',unlocked:S.stars>=1},
    {name:'Super champion',desc:'Avoir 20 étoiles',icon:'🌟',unlocked:S.stars>=20},
    {name:'Mission accomplie',desc:'Compléter une tâche',icon:'✅',unlocked:S.tasks.some(t=>t.done)},
    {name:'Quiz master',desc:'Score parfait au quiz',icon:'🧠',unlocked:S.qScore>=7},
    {name:'Animal heureux',desc:'Nourrir son animal',icon:'🐾',unlocked:S.hunger>=90},
    {name:'Propriétaire',desc:'Acheter en boutique',icon:'🛍️',unlocked:S.shopItems.some(i=>i.owned)},
    {name:'Écrivain',desc:'Écrire dans le journal',icon:'📖',unlocked:S.kidNotes.length>0},
    {name:'À l\'écoute',desc:'Enregistrer son humeur',icon:'💆',unlocked:S.selectedMood>=0},
    {name:'Sportif',desc:'Faire 3 exercices',icon:'🏃',unlocked:S.workouts.filter(w=>w.done).length>=3},
    {name:'Chef cuisto',desc:'Consulter 2 recettes',icon:'👨‍🍳',unlocked:false},
  ];
  const unlocked=trophees.filter(t=>t.unlocked).length;
  return `
  <div class="card" style="text-align:center;padding:16px">
    <div style="font-size:40px">🏆</div>
    <div style="font-size:15px;font-weight:500;margin-top:6px">${unlocked} / ${trophees.length} trophées débloqués</div>
    <div class="progress" style="margin:10px auto;max-width:200px"><div class="progress-fill" style="width:${pct(unlocked,trophees.length)}%;background:var(--ca)"></div></div>
  </div>
  ${trophees.map(t=>`
  <div class="trophy-card" style="${t.unlocked?'background:var(--cal);border-color:var(--ca)':''}">
    <div style="font-size:32px;width:48px;text-align:center">${t.unlocked?t.icon:'🔒'}</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:500">${t.name}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${t.desc}</div>
    </div>
    ${t.unlocked?`<span class="badge badge-amber">Débloqué !</span>`:'<span class="badge badge-gray">Verrouillé</span>'}
  </div>`).join('')}`;
}

function renderKStats(){
  return `
  <div class="grid-2">
    <div class="stat-card" style="background:var(--cpl);border:0.5px solid var(--cp)"><div class="stat-label" style="color:var(--cpd)">Étoiles totales</div><div class="stat-val" style="color:var(--cpd)">⭐ ${S.stars}</div></div>
    <div class="stat-card" style="background:var(--ctl);border:0.5px solid var(--ct)"><div class="stat-label" style="color:var(--ctd)">Niveau</div><div class="stat-val" style="color:var(--ctd)">${S.level}</div></div>
    <div class="stat-card" style="background:var(--cal);border:0.5px solid var(--ca)"><div class="stat-label" style="color:var(--cad)">XP</div><div class="stat-val" style="color:var(--cad)">${S.xp} / 100</div></div>
    <div class="stat-card" style="background:var(--ckl);border:0.5px solid var(--ck)"><div class="stat-label" style="color:var(--ckd)">Quiz score</div><div class="stat-val" style="color:var(--ckd)">${S.qScore} / ${S.quizData.length}</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-chart-line" aria-hidden="true"></i>Mon humeur cette semaine</div>
    <div class="bar-chart">
      ${[...S.moodHistory].slice(-7).map(m=>`<div class="bar" style="height:${100-m*22}%;background:var(--cp)">${S.moods[m]}</div>`).join('')}
    </div>
    <div class="chart-labels">${['L','M','M','J','V','S','D'].map(d=>`<div class="chart-label">${d}</div>`).join('')}</div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-trophy" aria-hidden="true"></i>Récapitulatif</div>
    <div class="list-row"><span style="flex:1">Missions complétées</span><span style="font-weight:500">${S.tasks.filter(t=>t.done).length}</span></div>
    <div class="list-row"><span style="flex:1">Exercices faits</span><span style="font-weight:500">${S.workouts.filter(w=>w.done).length}</span></div>
    <div class="list-row"><span style="flex:1">Entrées dans le journal</span><span style="font-weight:500">${S.kidNotes.length}</span></div>
    <div class="list-row"><span style="flex:1">Articles en boutique</span><span style="font-weight:500">${S.shopItems.filter(i=>i.owned).length}</span></div>
    <div class="list-row"><span style="flex:1">Bonnes réponses au quiz</span><span style="font-weight:500">${S.qScore}</span></div>
  </div>`;
}

/* ===== INIT ===== */
buildNav();
renderPage();
document.getElementById('notif-dot').style.display='block';
</script>
