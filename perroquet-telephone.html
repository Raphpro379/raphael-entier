<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perroquet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #8fd0a0; }
  body { background: linear-gradient(to bottom, #bfe9d0 0%, #8fd0a0 55%, #5aa87a 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #c0392a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<circle cx="315" cy="55" r="24" fill="#fff2c0" opacity="0.9"/>

<!-- feuilles tropicales -->
<g fill="#3a8a4a"><path d="M20 120 Q60 100 90 130 Q55 135 20 120 Z"/><path d="M360 150 Q320 130 290 160 Q325 165 360 150 Z"/></g>

<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- queue longue -->
<path d="M188 250 Q182 300 176 330 Q186 322 192 300 Q196 322 202 328 Q200 290 202 250 Z" fill="#2a9ad0"/>
<path d="M190 260 Q186 300 182 322 Q190 316 194 296 Z" fill="#3ab0e0"/>

<g stroke="#e0a030" stroke-width="4" stroke-linecap="round"><line x1="185" y1="248" x2="185" y2="262"/><line x1="205" y1="248" x2="205" y2="262"/></g>
<!-- corps -->
<ellipse cx="195" cy="205" rx="42" ry="50" fill="#e03a3a"/>
<!-- aile -->
<g><animateTransform attributeName="transform" type="rotate" values="0 205 200;-8 205 200;0 205 200" dur="2s" repeatCount="indefinite"/>
<path d="M215 175 Q250 185 248 225 Q225 235 210 215 Z" fill="#f0b028"/>
<path d="M218 180 Q245 190 244 218 Q228 226 215 210 Z" fill="#3aa84a"/>
<path d="M222 188 Q242 196 242 214 Q230 220 220 208 Z" fill="#2a9ad0"/></g>
<!-- tete -->
<circle cx="180" cy="150" r="34" fill="#e03a3a"/>
<!-- joue -->
<circle cx="168" cy="158" r="12" fill="#fff"/>
<circle cx="172" cy="156" r="6" fill="#2e2e2e"/><circle cx="174" cy="154" r="2" fill="#fff"/>
<!-- huppe -->
<g fill="#ffd24a"><path d="M175 118 L170 100 L182 116 Z"/><path d="M188 118 L192 98 L196 118 Z"/><path d="M182 116 L185 96 L190 116 Z"/></g>
<!-- bec crochu -->
<path d="M158 152 Q135 150 138 168 Q152 172 160 162 Z" fill="#3a3a3a"/>
<path d="M158 152 Q142 152 142 164 Q152 166 160 160 Z" fill="#5a5a5a"/>
</g>
</svg>
<div id="hint">Mon perroquet 🦜</div>
</body>
</html>
