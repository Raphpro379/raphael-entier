<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voiture de course</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #aee0ff; }
  body { background: linear-gradient(to bottom, #bfe9ff 0%, #9ad0e8 55%, #c0c0c8 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 94vw; max-width: 520px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #c02a2a; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="car" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff5a5a"/><stop offset="100%" stop-color="#d02a2a"/></linearGradient></defs>
<circle cx="315" cy="55" r="24" fill="#fff2c0"/>
<g><ellipse cx="80" cy="65" rx="28" ry="12" fill="#fff" opacity="0.85"/><ellipse cx="102" cy="58" rx="20" ry="10" fill="#fff" opacity="0.85"/><animateTransform attributeName="transform" type="translate" values="0 0;30 0;0 0" dur="16s" repeatCount="indefinite"/></g>
<!-- collines qui defilent -->
<g><ellipse cx="100" cy="230" rx="90" ry="40" fill="#8fd060"/><ellipse cx="320" cy="235" rx="100" ry="40" fill="#7bc04a"/><animateTransform attributeName="transform" type="translate" values="0 0;-200 0" dur="2s" repeatCount="indefinite"/></g>
<g><ellipse cx="500" cy="230" rx="90" ry="40" fill="#8fd060"/><ellipse cx="720" cy="235" rx="100" ry="40" fill="#7bc04a"/><animateTransform attributeName="transform" type="translate" values="0 0;-200 0" dur="2s" repeatCount="indefinite"/></g>
<!-- route -->
<rect x="0" y="258" width="380" height="82" fill="#5a5a64"/>
<g fill="#ffd24a"><rect x="10" y="295" width="40" height="6"/><rect x="90" y="295" width="40" height="6"/><rect x="170" y="295" width="40" height="6"/><rect x="250" y="295" width="40" height="6"/><rect x="330" y="295" width="40" height="6"/><animateTransform attributeName="transform" type="translate" values="0 0;-80 0" dur="0.3s" repeatCount="indefinite"/></g>
<!-- lignes de vitesse -->
<g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"><line x1="40" y1="200" x2="80" y2="200"><animate attributeName="opacity" values="0;0.7;0" dur="0.5s" repeatCount="indefinite"/></line><line x1="30" y1="215" x2="65" y2="215"><animate attributeName="opacity" values="0.7;0;0.7" dur="0.5s" repeatCount="indefinite"/></line></g>
<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -2; 0 0" dur="0.2s" repeatCount="indefinite"/>
<!-- corps voiture -->
<path d="M90 240 L120 240 L140 215 L230 215 L250 240 L300 245 Q310 246 310 255 L310 262 L85 262 Q80 262 80 254 Q80 244 90 240 Z" fill="url(#car)"/>
<!-- aileron -->
<rect x="82" y="220" width="8" height="24" fill="#a01a1a"/><rect x="76" y="216" width="20" height="6" fill="#c02a2a"/>
<!-- cockpit -->
<path d="M148 218 L222 218 L238 238 L138 238 Z" fill="#3a4a5a"/>
<path d="M155 222 L215 222 L226 236 L148 236 Z" fill="#8fd0f0"/>
<!-- casque pilote -->
<circle cx="185" cy="228" r="10" fill="#ffd24a"/><path d="M178 228 Q185 224 192 228" stroke="#3a3a3a" stroke-width="2" fill="none"/>
<!-- numero -->
<circle cx="270" cy="245" r="12" fill="#fff"/><text x="270" y="250" font-size="14" font-family="sans-serif" font-weight="bold" fill="#d02a2a" text-anchor="middle">1</text>
<!-- bandes -->
<rect x="90" y="248" width="215" height="4" fill="#fff" opacity="0.8"/>
<!-- roues -->
<circle cx="130" cy="265" r="24" fill="#2a2a2a"/><circle cx="130" cy="265" r="10" fill="#8a8a8a"/>
<circle cx="265" cy="265" r="24" fill="#2a2a2a"/><circle cx="265" cy="265" r="10" fill="#8a8a8a"/>
<g stroke="#5a5a5a" stroke-width="2"><line x1="130" y1="255" x2="130" y2="275"><animateTransform attributeName="transform" type="rotate" from="0 130 265" to="360 130 265" dur="0.2s" repeatCount="indefinite"/></line><line x1="265" y1="255" x2="265" y2="275"><animateTransform attributeName="transform" type="rotate" from="0 265 265" to="360 265 265" dur="0.2s" repeatCount="indefinite"/></line></g>
</g>
</svg>
<div id="hint">Ma voiture de course 🏎️</div>
</body>
</html>
