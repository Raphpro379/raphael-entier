<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Champignon magique</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a3a; }
  body { background: linear-gradient(to bottom, #2a1a4a 0%, #1a2a3a 55%, #2a3a2a 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  svg { width: 90vw; max-width: 480px; height: auto; }
  #hint { position: fixed; bottom: 22px; left: 0; right: 0; text-align: center; color: #ffb0e0; font-size: 15px; opacity: 0.85; pointer-events: none; }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="cap" cx="50%" cy="35%" r="65%"><stop offset="0%" stop-color="#ff6b9a"/><stop offset="100%" stop-color="#d02a6a"/></radialGradient>
<linearGradient id="stem" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff0e0"/><stop offset="100%" stop-color="#e0d0c0"/></linearGradient>
</defs>
<!-- lucioles / etincelles -->
<g fill="#c0ffb0">
<circle cx="60" cy="100" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="320" cy="120" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/><animate attributeName="cy" values="120;95;120" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="300" cy="200" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/><animate attributeName="cy" values="200;180;200" dur="4.5s" repeatCount="indefinite"/></circle>
<circle cx="70" cy="200" r="1.8"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/><animate attributeName="cy" values="200;175;200" dur="5.5s" repeatCount="indefinite"/></circle>
</g>
<g fill="#ffffff"><circle cx="150" cy="50" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle><circle cx="250" cy="60" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle></g>
<!-- sol -->
<ellipse cx="190" cy="320" rx="200" ry="40" fill="#2a3a24"/>
<g fill="#3a5a2a"><path d="M60 310 Q56 296 54 309 Z"/><path d="M310 312 Q306 298 304 311 Z"/><path d="M110 316 Q106 302 104 315 Z"/></g>
<!-- petits champignons -->
<g><ellipse cx="90" cy="290" rx="14" ry="9" fill="#e05a7a"/><rect x="86" y="290" width="8" height="14" rx="3" fill="#fff0e0"/><circle cx="86" cy="286" r="2" fill="#fff"/><circle cx="94" cy="288" r="1.5" fill="#fff"/></g>
<g><ellipse cx="300" cy="298" rx="12" ry="8" fill="#e05a7a"/><rect x="296" y="298" width="8" height="12" rx="3" fill="#fff0e0"/><circle cx="298" cy="295" r="1.8" fill="#fff"/></g>
<g>
<animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
<!-- lueur autour -->
<ellipse cx="190" cy="180" rx="90" ry="80" fill="#ff6b9a" opacity="0.12"><animate attributeName="opacity" values="0.08;0.2;0.08" dur="3s" repeatCount="indefinite"/></ellipse>
<!-- pied -->
<path d="M172 290 Q168 230 178 195 L202 195 Q212 230 208 290 Z" fill="url(#stem)"/>
<ellipse cx="190" cy="290" rx="24" ry="7" fill="#e0d0c0"/>
<!-- collerette -->
<ellipse cx="190" cy="198" rx="26" ry="7" fill="#f0e0d0"/>
<!-- chapeau -->
<path d="M118 195 Q118 120 190 118 Q262 120 262 195 Q226 210 190 210 Q154 210 118 195 Z" fill="url(#cap)"/>
<!-- points blancs -->
<g fill="#fff5e8"><circle cx="160" cy="155" r="9"/><circle cx="210" cy="150" r="11"/><circle cx="190" cy="180" r="8"/><circle cx="140" cy="182" r="7"/><circle cx="235" cy="178" r="8"/><circle cx="185" cy="138" r="6"/></g>
<!-- visage mignon -->
<circle cx="172" cy="185" r="4" fill="#3a2a3a"/><circle cx="208" cy="185" r="4" fill="#3a2a3a"/>
<circle cx="173" cy="184" r="1.3" fill="#fff"/><circle cx="209" cy="184" r="1.3" fill="#fff"/>
<path d="M182 194 Q190 200 198 194" stroke="#3a2a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
<ellipse cx="164" cy="192" rx="5" ry="3.5" fill="#ff9ac0" opacity="0.6"/><ellipse cx="216" cy="192" rx="5" ry="3.5" fill="#ff9ac0" opacity="0.6"/>
</g>
</svg>
<div id="hint">Mon champignon magique 🍄</div>
</body>
</html>
